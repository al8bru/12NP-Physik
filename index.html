<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wechselspannung Lernapp – Abiturversion Plus</title>
  <style>
    :root{
      --bg1:#f7fffc; --bg2:#edf8f5; --bg3:#dfeeea;
      --card:#ffffffee; --text:#163434; --muted:#52706d;
      --line:#b9e3d9; --teal:#0f766e; --teal2:#0b5f59;
      --mint:#e9fbf4; --sky:#eef7ff; --amber:#fff7dc; --rose:#fff1f5;
      --ok:#edf9f0; --okline:#b9e4c6; --warn:#fff6dd; --warnline:#eed18a;
      --shadow:0 16px 40px rgba(28,84,72,.10); --radius:28px;
      --shadow-soft:0 10px 24px rgba(28,84,72,.08);
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, var(--bg1) 0%, var(--bg2) 36%, var(--bg3) 100%);
    }
    .wrap{max-width:1200px;margin:0 auto;padding:16px}
    .nav{
      position:sticky;top:0;z-index:20;
      display:flex;flex-wrap:wrap;gap:8px;
      padding:12px;border:1px solid var(--line);border-radius:24px;
      background:#ffffffdb;backdrop-filter:blur(10px);
      box-shadow:0 10px 28px rgba(44,95,82,.08);
      margin-bottom:18px;
    }
    .tab{
      border:1px solid var(--line);background:#fff;color:var(--teal2);
      border-radius:16px;padding:10px 14px;font-weight:700;cursor:pointer;
      transition:transform .14s ease, background .18s ease, box-shadow .18s ease;
    }
    .tab:hover{transform:translateY(-1px);box-shadow:var(--shadow-soft)}
    .tab.active{background:var(--teal);color:#fff;border-color:var(--teal)}
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:22px;
      margin-bottom:18px;
    }
    .hero{
      background:
        radial-gradient(circle at top right, #ffffff 0%, #f6fffb 35%, #ebfaf5 70%, #e1f2ed 100%);
      overflow:hidden;
      position:relative;
    }
    .hero::after{
      content:"";
      position:absolute;right:-80px;top:-80px;width:280px;height:280px;border-radius:50%;
      background:radial-gradient(circle, rgba(15,118,110,.16) 0%, rgba(15,118,110,0) 70%);
      pointer-events:none;
    }
    .dark{
      background:linear-gradient(135deg,#0d403b,#114752 72%);
      color:#eefaf8;border-color:#11443e;
    }
    h1,h2,h3{margin:0 0 10px 0;line-height:1.12}
    h1{font-size:clamp(2rem,4vw,3.5rem)}
    h2{font-size:clamp(1.35rem,2vw,1.9rem)}
    h3{font-size:1.08rem}
    p{margin:0 0 10px 0;line-height:1.7}
    .muted{color:var(--muted)}
    .grid{display:grid;gap:16px}
    .grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    @media (max-width: 950px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}
    .topic-btn{
      width:100%;text-align:left;cursor:pointer;border:1px solid var(--line);
      background:#fff;border-radius:22px;padding:16px;transition:.18s;
    }
    .topic-btn:hover{background:#f1fbf7;transform:translateY(-2px);box-shadow:var(--shadow-soft)}
    .topic-title{font-weight:800;color:var(--teal2);margin-bottom:8px}
    .mini{
      border:1px solid var(--line);background:#fff;border-radius:18px;padding:14px;
    }
    .badge,.marker{
      display:inline-flex;align-items:center;gap:6px;
      padding:6px 10px;border-radius:999px;font-size:.76rem;font-weight:800;
    }
    .badge{background:#dff5ef;color:#0c5c55;border:1px solid #b8e5d8}
    .marker{background:#edf9f5;color:#0f766e;border:1px solid #bfe3db}
    .marker.warn{background:#fff1c9;color:#8a6500;border-color:#f2d37c}
    .marker.dark{background:var(--teal);color:#fff;border-color:var(--teal)}
    .marker.rose{background:#fff0f5;color:#9d2b54;border-color:#ffc7da}
    .btnrow{display:flex;gap:10px;flex-wrap:wrap}
    .btn{
      border:1px solid var(--line);border-radius:16px;padding:10px 14px;
      background:#fff;color:var(--teal2);font-weight:800;cursor:pointer;
      transition:transform .14s ease, box-shadow .18s ease;
    }
    .btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-soft)}
    .btn.primary{background:var(--teal);color:#fff;border-color:var(--teal)}
    .formula{
      border:1px solid var(--line);
      background:linear-gradient(135deg,#eefaf6,#ffffff);
      border-radius:18px;padding:13px 14px;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      overflow-x:auto;
    }
    .soft-mint{background:var(--mint)} .soft-sky{background:var(--sky)}
    .soft-amber{background:var(--amber)} .soft-rose{background:var(--rose)}
    .label{font-size:.92rem;font-weight:700;margin-bottom:6px;display:block}
    input[type="text"], textarea{
      width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:16px;
      font:inherit;color:var(--text);background:#fff;
    }
    textarea{min-height:130px;resize:vertical}
    .choice{
      width:100%;text-align:left;border:1px solid var(--line);background:#fff;
      border-radius:16px;padding:12px 14px;cursor:pointer;transition:.16s ease;
    }
    .choice:hover{background:#f5fcf8}
    .choice.sel{border-color:var(--teal);background:#eefaf6}
    .feedback{
      margin-top:12px;padding:12px 14px;border-radius:16px;border:1px solid var(--line)
    }
    .ok{background:var(--ok);border-color:var(--okline)}
    .warnbox{background:var(--warn);border-color:var(--warnline)}
    .progress{
      width:100%;height:12px;border-radius:999px;background:#def0ea;overflow:hidden;
    }
    .progress > span{display:block;height:100%;background:linear-gradient(90deg,#0f766e,#14b8a6)}
    .small{font-size:.94rem;line-height:1.7}
    table{width:100%;border-collapse:separate;border-spacing:0 8px;font-size:.95rem}
    th,td{padding:12px 10px;text-align:left}
    tbody tr{background:#fff}
    .center{display:flex;align-items:center;justify-content:center}
    .checkitem{
      display:flex;gap:12px;align-items:flex-start;border:1px solid var(--line);
      background:#fff;border-radius:18px;padding:14px
    }
    .sub{font-size:.72em;vertical-align:sub}
    .stat{
      border:1px solid var(--line);background:#fff;border-radius:22px;padding:16px;
      box-shadow:var(--shadow-soft)
    }
    .stat-num{font-size:1.45rem;font-weight:900;color:var(--teal2)}
    .ring{
      width:82px;height:82px;border-radius:50%;
      display:grid;place-items:center;
      background:conic-gradient(var(--teal) var(--p), #dfeeea 0);
      position:relative;
      margin:auto;
    }
    .ring::after{
      content:"";position:absolute;inset:8px;background:#fff;border-radius:50%;
    }
    .ring > span{position:relative;z-index:1;font-weight:900;color:var(--teal2)}
    .section-title-row{
      display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px
    }
    .achievement{
      border:1px solid var(--line);background:#fff;border-radius:18px;padding:12px 14px;
      display:flex;align-items:center;gap:10px
    }
    .pulse{
      animation:pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse{
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.03)}
    }
    .streak{
      background:linear-gradient(135deg,#fff8e8,#fff2c7);
      border:1px solid #f0d480;
    }
  </style>
</head>

<script>
const NAV_ITEMS=[["start","Start"],["grundlagen","Grundlagen"],["sinus","Sinuskurve"],["rlc","R · L · C"],["rechnen","Rechnen"],["training","Klausurvorbereitung"],["abitur","Abituraufgaben"],["miniklausur","Mini-Klausur"],["checkliste","Checkliste"]];
const checklistItems=["Ich kann Gleichspannung und Wechselspannung unterscheiden.","Ich kann Periodendauer T, Frequenz f und Kreisfrequenz ω sicher zuordnen.","Ich kann Effektivwert und Scheitelwert unterscheiden und umrechnen.","Ich kann die Phasenlage von U und I in Zeitdiagrammen fachsprachlich korrekt beschreiben.","Ich kann ohmschen Widerstand, induktiven Blindwiderstand und kapazitiven Blindwiderstand sicher unterscheiden.","Ich kann X_L und X_C korrekt berechnen und physikalisch deuten.","Ich kann begründen, wie sich Spule und Kondensator bei steigender Frequenz verhalten.","Ich kann den Reihenschwingkreis qualitativ beschreiben und die Thomsonsche Gleichung zuordnen.","Ich kann einen PTA-/Labor-Kontext fachlich analysieren.","Ich kann operatorenorientierte Klausuraufgaben bearbeiten."];
const startTopics=[{title:"Grundlagen",target:"grundlagen",text:"Wechselspannung, Periodendauer, Frequenz, Kreisfrequenz, Effektivwert und Scheitelwert."},{title:"Sinuskurve",target:"sinus",text:"Zeitdiagramme, Amplitude, Phase und die Deutung von Spannung U und Stromstärke I."},{title:"Rechnen",target:"rechnen",text:"X_L, X_C, Formeln, Einheiten, Rundungen und physikalische Interpretation der Ergebnisse."},{title:"Klausurvorbereitung",target:"training",text:"Operatoren, typische Aufgaben, Fehlerrückmeldungen und klausurnahe Formulierungen."}];
const ptaBlocks=[{title:"Oszilloskop",text:"Zeitliche Verläufe von U und I vergleichen, Phasenlagen erkennen und daraus auf Bauelemente schließen."},{title:"Signalverarbeitung",text:"Frequenzabhängiges Verhalten von Spule und Kondensator für Filter und Messschaltungen deuten."},{title:"Elektronische Messanordnungen",text:"Bauelemente fachlich begründet auswählen, Messergebnisse auswerten und technische Entscheidungen treffen."}];
const rlcData={R:{label:"Ohmscher Leiter",type:"ohmscher Widerstand",formula:"R",phase:"U und I sind phasengleich (Δφ = 0°).",frequency:"frequenzunabhängig",meaning:"Der ohmsche Widerstand ist der Referenzfall im Wechselstromkreis. Sein Wert bleibt unabhängig von der Frequenz konstant.",error:"Typische Verwechslung: Auch im Wechselstromkreis bleibt beim idealen ohmschen Leiter keine Phasenverschiebung zurück.",soft:"soft-mint"},L:{label:"Spule",type:"induktiver Blindwiderstand",formula:"X_L = ω · L = 2πfL",phase:"Die Spannung eilt der Stromstärke um 90° voraus.",frequency:"X_L steigt mit f",meaning:"Je höher die Frequenz, desto größer wird der induktive Blindwiderstand. Die Spule hemmt schnelle Stromänderungen besonders stark.",error:"Typische Verwechslung: Die Spule wird bei hoher Frequenz nicht durchlässiger, sondern wirkt stärker hemmend.",soft:"soft-sky"},C:{label:"Kondensator",type:"kapazitiver Blindwiderstand",formula:"X_C = 1 / (ω · C) = 1 / (2πfC)",phase:"Die Stromstärke eilt der Spannung um 90° voraus.",frequency:"X_C sinkt mit f",meaning:"Je höher die Frequenz, desto kleiner wird der kapazitive Blindwiderstand. Der Kondensator wird für Wechselstrom durchlässiger.",error:"Typische Verwechslung: Beim Kondensator eilt nicht die Spannung voraus, sondern die Stromstärke.",soft:"soft-mint"}};
const diagramTasks=[{id:1,operator:"beschreiben",prompt:"Beschreiben Sie für den ohmschen Leiter die Lage von Spannung U und Stromstärke I im Zeitdiagramm.",solution:"Beim ohmschen Leiter sind Spannung und Stromstärke phasengleich. Maxima, Minima und Nulldurchgänge treten gleichzeitig auf."},{id:2,operator:"erläutern",prompt:"Erläutern Sie, woran man im Zeitdiagramm erkennt, dass es sich um eine Spule handelt.",solution:"Die Spannung erreicht charakteristische Punkte früher als die Stromstärke. U eilt I um 90° voraus."},{id:3,operator:"begründen",prompt:"Begründen Sie, weshalb beim Kondensator die Stromstärke der Spannung voreilt.",solution:"Beim idealen Kondensator ist die Stromstärke an die Spannungsänderung gekoppelt. Deshalb reagiert I früher als U und eilt um 90° voraus."},{id:4,operator:"deuten",prompt:"Deuten Sie die Aussage: Die gestrichelte Kurve liegt im Zeitdiagramm links von der durchgezogenen Kurve.",solution:"Liegt die Stromstärke links von der Spannung, dann eilt die Stromstärke voraus. Das ist ein Hinweis auf einen Kondensator."}];
const trainingQuestions=[{id:1,operator:"erläutern",prompt:"Welche Größe ist der Kehrwert der Periodendauer T?",options:["Amplitude","Frequenz","Effektivwert","Phasenwinkel"],correct:1,explanation:"Es gilt f = 1 / T. Die Frequenz gibt an, wie viele vollständige Perioden pro Sekunde auftreten."},{id:2,operator:"begründen",prompt:"Was passiert mit X_C, wenn die Frequenz größer wird?",options:["X_C wird größer","X_C bleibt konstant","X_C wird kleiner","X_C wird null"],correct:2,explanation:"Da X_C = 1 / (2πfC) gilt, sinkt X_C bei steigender Frequenz. Der Kondensator wird dadurch für Wechselstrom durchlässiger."},{id:3,operator:"erläutern",prompt:"Welche Aussage beschreibt die ideale Spule richtig?",options:["U und I sind phasengleich.","Die Spannung folgt der Stromstärke nach.","Die Spannung eilt der Stromstärke voraus.","X_L sinkt mit der Frequenz."],correct:2,explanation:"Bei der idealen Spule eilt die Spannung U der Stromstärke I um 90° voraus."},{id:4,operator:"berechnen",prompt:"Welche Formel beschreibt den Effektivwert einer sinusförmigen Wechselspannung?",options:["U_eff = Û / 2","U_eff = Û / √2","U_eff = Û²","U_eff = Û / 2π"],correct:1,explanation:"Für sinusförmige Wechselspannung gilt U_eff = Û / √2. Umgekehrt gilt Û = U_eff · √2."},{id:5,operator:"beurteilen",prompt:"Welches Bauelement hemmt bei sehr hoher Frequenz den Stromfluss am stärksten?",options:["Kondensator","Spule","Keines von beiden","Immer der ohmsche Leiter"],correct:1,explanation:"Der induktive Blindwiderstand X_L wächst mit der Frequenz. Deshalb hemmt die Spule hohe Frequenzen besonders stark."},{id:6,operator:"deuten",prompt:"Ein Oszilloskop zeigt: Die Spannung erreicht ihr Maximum früher als die Stromstärke. Welches Bauelement ist am wahrscheinlichsten beteiligt?",options:["Ohmscher Leiter","Spule","Kondensator","Nur aus dem Effektivwert bestimmbar"],correct:1,explanation:"Wenn die Spannung der Stromstärke voraus eilt, spricht das für das Verhalten einer Spule."}];
const ptaQuestions=[{title:"Oszilloskopmessung",task:"Arbeitsauftrag: Erläutern Sie, wie man aus der Phasenlage im Zeitdiagramm erkennt, ob eher eine Spule oder ein Kondensator vorliegt.",hint:"Entscheidend ist, welche Größe zeitlich voreilt: Spannung oder Stromstärke."},{title:"Filterwirkung in einer Schaltung",task:"Arbeitsauftrag: Begründen Sie, warum die Frequenzabhängigkeit von Spule und Kondensator für Filteranwendungen wichtig ist.",hint:"Spule und Kondensator verändern ihren Blindwiderstand mit der Frequenz in entgegengesetzter Weise."},{title:"Bauteilauswahl in der Messtechnik",task:"Arbeitsauftrag: Beurteilen Sie, welches Bauelement bei hoher Frequenz eher hemmend wirkt und welches eher durchlässig wird.",hint:"Bei der Spule wächst X_L mit f, beim Kondensator sinkt X_C mit f."}];
const miniExamTasks=[{id:"a",operator:"beschreiben",title:"Teilaufgabe a)",prompt:"Beschreiben Sie die Phasenlage von Spannung U und Stromstärke I bei einer idealen Spule im Wechselstromkreis.",expectation:"Die Spannung eilt der Stromstärke um 90° voraus. Die Stromstärke läuft nach."},{id:"b",operator:"berechnen",title:"Teilaufgabe b)",prompt:"Gegeben sind L = 80 mH und f = 50 Hz. Berechnen Sie den induktiven Blindwiderstand X_L.",expectation:"Zuerst: L = 0,08 H. Dann: X_L = 2π · 50 · 0,08 ≈ 25,13 Ω."},{id:"c",operator:"deuten",title:"Teilaufgabe c)",prompt:"Deuten Sie das Ergebnis aus Teilaufgabe b) physikalisch im Hinblick auf den Stromfluss durch die Spule.",expectation:"Ein induktiver Blindwiderstand von etwa 25 Ω bedeutet, dass die Spule dem Wechselstrom einen deutlichen frequenzabhängigen Widerstand entgegensetzt."},{id:"d",operator:"beurteilen",title:"Teilaufgabe d)",prompt:"Beurteilen Sie, ob die Spule bei höherer Frequenz den Stromfluss eher stärker oder eher schwächer hemmt. Begründen Sie physikalisch.",expectation:"Die Spule hemmt bei höherer Frequenz stärker, weil X_L = 2πfL mit wachsender Frequenz zunimmt."}];
const calculationTasks=[{id:1,level:"Basis",operator:"berechnen",prompt:"Eine Wechselspannung hat die Periodendauer T = 0,02 s. Berechnen Sie die Frequenz f.",expected:50,unit:"Hz",tolerance:0.2,hint:"Nutzen Sie f = 1 / T.",solution:"f = 1 / 0,02 s = 50 Hz",error:"Vermutlich wurde T nicht als Kehrwert eingesetzt oder die Einheit nicht beachtet.",interpretation:"Eine Frequenz von 50 Hz bedeutet, dass pro Sekunde 50 vollständige Perioden auftreten."},{id:2,level:"Klausurniveau",operator:"berechnen",prompt:"Für eine Spule gilt L = 80 mH und f = 50 Hz. Berechnen Sie den induktiven Blindwiderstand X_L.",expected:25.13,unit:"Ω",tolerance:0.2,hint:"Nutzen Sie X_L = 2πfL und achten Sie darauf, 80 mH in H umzurechnen.",solution:"L = 0,08 H, daher X_L = 2π · 50 · 0,08 ≈ 25,13 Ω",error:"Wahrscheinlich wurde mH nicht in H umgerechnet oder die Formel des Kondensators verwendet.",interpretation:"Ein induktiver Blindwiderstand von rund 25 Ω bedeutet, dass die Spule dem Wechselstrom einen spürbaren frequenzabhängigen Widerstand entgegensetzt."},{id:3,level:"Klausurniveau",operator:"berechnen",prompt:"Für einen Kondensator gilt C = 10 µF und f = 50 Hz. Berechnen Sie den kapazitiven Blindwiderstand X_C.",expected:318.31,unit:"Ω",tolerance:1,hint:"Nutzen Sie X_C = 1 / (2πfC) und wandeln Sie 10 µF in F um.",solution:"C = 10 · 10^-6 F, daher X_C = 1 / (2π · 50 · 10^-5) ≈ 318,31 Ω",error:"Wahrscheinlich wurde µF nicht in F umgerechnet oder die Formel der Spule verwendet.",interpretation:"Der kapazitive Blindwiderstand ist hier deutlich größer als im Spulenbeispiel. Der Kondensator hemmt den Stromfluss bei dieser Frequenz also noch stark."},{id:4,level:"Transfer",operator:"berechnen",prompt:"Im Stromnetz beträgt der Effektivwert 230 V. Berechnen Sie den Scheitelwert Û.",expected:325.27,unit:"V",tolerance:0.5,hint:"Nutzen Sie Û = U_eff · √2.",solution:"Û = 230 V · √2 ≈ 325,27 V",error:"Hier wurde vermutlich Effektivwert und Scheitelwert verwechselt oder mit 2 statt mit √2 multipliziert.",interpretation:"Die 230 V im Stromnetz sind nicht der Spitzenwert. Der maximale Spannungswert liegt tatsächlich bei etwa 325 V."}];
const abiturTasks=[{year:"2020",title:"Kapazitiver Blindwiderstand berechnen",operator:"berechnen",prompt:"Berechnen Sie den kapazitiven Blindwiderstand X_C für C = 50 pF und C = 200 pF bei f = 100 Hz sowie f = 10 MHz.",hint:"Nutzen Sie X_C = 1 / (2πfC) und achten Sie konsequent auf die Umrechnung von pF in F.",solution:"Für 50 pF gilt: bei 100 Hz etwa 3,18 · 10^7 Ω, bei 10 MHz etwa 318 Ω. Für 200 pF gilt: bei 100 Hz etwa 0,80 · 10^7 Ω, bei 10 MHz etwa 80 Ω.",kind:"calc"},{year:"2020",title:"Phasenlage im RC-Kreis deuten",operator:"erläutern",prompt:"Erläutern Sie qualitativ anhand eines Zeigerdiagramms die Phasenlage der Teilspannungen U_R und U_C in einer Reihenschaltung aus Widerstand und Kondensator.",hint:"Im RC-Kreis sind die Spannungszeiger nicht phasengleich. Entscheidend ist die 90°-Verschiebung zwischen ohmschem und kapazitivem Anteil.",solution:"Die Kondensatorspannung U_C läuft der Spannung am Widerstand U_R um 90° hinterher. Da in der Reihenschaltung derselbe Strom fließt, lassen sich die Teilspannungen über die Wechselstromwiderstände zeigerdiagrammatisch darstellen.",kind:"text"},{year:"2020",title:"Gesamtimpedanz eines RC-Kreises herleiten",operator:"herleiten",prompt:"Leiten Sie die Gesamtimpedanz Z(f) einer Reihenschaltung aus Kondensator und ohmschem Widerstand in Abhängigkeit von der Frequenz her.",hint:"Nutzen Sie den Satz des Pythagoras für die um 90° phasenverschobenen Anteile R und X_C.",solution:"Es gilt Z² = R² + X_C². Mit X_C = 1 / (ωC) folgt Z(f) = √(R² + 1 / (ωC)²) = √(R² + 1 / (2πfC)²).",kind:"text"},{year:"2020",title:"Übertragungsfunktion des Spannungsteilers",operator:"herleiten",prompt:"Leiten Sie für den RC-Spannungsteiler die Übertragungsfunktion für die Kondensatorspannung her.",hint:"Setzen Sie das Verhältnis der Spannungen gleich dem Verhältnis der zugehörigen Wechselstromwiderstände.",solution:"Für den frequenzabhängigen Spannungsteiler gilt U_C / U_e = X_C / Z. Damit folgt U_C = U_e · X_C / √(R² + X_C²) = U_e · 1 / √(1 + R² / X_C²).",kind:"text"},{year:"2020",title:"Spannung am Kondensator berechnen",operator:"ermitteln",prompt:"Ein Kondensator mit C = 100 pF ist mit R = 2 kΩ in Reihe geschaltet. Es liegt eine Wechselspannung mit f = 1,0 MHz und der Amplitude U_e = 10 V an. Ermitteln Sie die Amplitude U_C am Kondensator.",hint:"Berechnen Sie zuerst X_C und setzen Sie das Ergebnis anschließend in die Übertragungsfunktion ein.",solution:"Mit X_C ≈ 1,592 · 10^3 Ω ergibt sich U_C ≈ 6,23 V.",kind:"calc"},{year:"2020",title:"Messbereich begründet beurteilen",operator:"erörtern",prompt:"Für einen kapazitiven Sensor stehen ein 1 kΩ- und ein 15 kΩ-Widerstand zur Verfügung. Erörtern Sie, welcher Widerstand den gesamten Messbereich der Kondensatorspannung von etwa 0 V bis 10 V besser abdeckt.",hint:"Vergleichen Sie, wie stark sich U_C im interessierenden Kapazitätsbereich verändert und welcher Widerstand den Spannungsbereich besser ausnutzt.",solution:"Der größere Widerstand nutzt den Spannungsbereich besser aus. Im zugrunde liegenden Abiturkontext deckt R = 15 kΩ den Messbereich deutlich günstiger ab als R = 1 kΩ.",kind:"text"},{year:"2021",title:"Kapazitätsverlauf im Zeitdiagramm deuten",operator:"skizzieren und erläutern",prompt:"Skizzieren und erläutern Sie den zeitlichen Verlauf der Kapazität C = f(t), wenn der Plattenabstand eines Kondensators zunächst konstant bleibt, dann kleiner wird, anschließend konstant klein bleibt und zuletzt wieder zunimmt.",hint:"Für den Plattenkondensator gilt C ~ 1 / d. Ein kleinerer Abstand bedeutet also eine größere Kapazität.",solution:"Solange d konstant ist, bleibt auch C konstant. Wird d kleiner, steigt C antiproportional an. Bleibt der kleine Abstand erhalten, bleibt C auf höherem Niveau konstant. Vergrößert sich d wieder, sinkt C entsprechend.",kind:"text"},{year:"2021",title:"RC-Zeitkonstante im technischen Kontext",operator:"begründen",prompt:"Begründen Sie am Beispiel eines Kondensatormikrofons, warum eine zu große Zeitkonstante τ = R · C problematisch ist.",hint:"Überlegen Sie, wie schnell sich der Kondensator an veränderliche Signale anpassen muss.",solution:"Ist τ zu groß, kann der Elektronenfluss der durch die Schallwelle verursachten Schwingung nicht schnell genug folgen. Hohe Frequenzen werden dann schlechter übertragen.",kind:"text"}];

function updateStreak(){const today=new Date().toISOString().slice(0,10); if(state.streak.last!==today){const prev=state.streak.last?new Date(state.streak.last):null; const now=new Date(today); let next=1; if(prev){const diff=Math.round((now-prev)/86400000); next = diff===1 ? (state.streak.count+1) : 1;} state.streak={last:today,count:next}; localStorage.setItem("wechselspannung_streak_v5",JSON.stringify(state.streak));}}
function sub(txt){return `<sub class="sub">${txt}</sub>`}
function physicsText(text){return String(text).replaceAll("U_eff",`U${sub("eff")}`).replaceAll("I_eff",`I${sub("eff")}`).replaceAll("X_R",`X${sub("R")}`).replaceAll("X_L",`X${sub("L")}`).replaceAll("X_C",`X${sub("C")}`).replaceAll("f_0",`f${sub("0")}`)}
function parseGermanNumber(v){const p=parseFloat(String(v).replace(",", "."));return Number.isFinite(p)?p:NaN}
function formatNumber(v,d=2){if(!Number.isFinite(Number(v))) return "–"; return Number(v).toFixed(d).replace(".",",")}
function computeValues(){const T=parseGermanNumber(state.tValue),L=parseGermanNumber(state.lValue),C=parseGermanNumber(state.cValue),f=parseGermanNumber(state.fValue),uEff=parseGermanNumber(state.uEffValue),omega=Number.isFinite(f)?2*Math.PI*f:NaN,res=Number.isFinite(L)&&Number.isFinite(C)&&L>0&&C>0?1/(2*Math.PI*Math.sqrt(L*C)):NaN;return{fFromT:Number.isFinite(T)&&T>0?1/T:NaN,omega,xl:Number.isFinite(omega)&&Number.isFinite(L)?omega*L:NaN,xc:Number.isFinite(omega)&&Number.isFinite(C)&&C>0?1/(omega*C):NaN,uHat:Number.isFinite(uEff)?uEff*Math.sqrt(2):NaN,resonance:res}}
function gamification(){const checklistDone=state.checklist.filter(Boolean).length;const quizTotal=trainingQuestions.length;const quizCorrect=trainingQuestions.filter(q=>state.quizAnswers[q.id]===q.correct).length;const abiDone=Object.values(state.abiturAnswers).filter(v=>String(v).trim()!=="").length;const miniDone=Object.values(state.miniDrafts).filter(v=>String(v).trim()!=="").length;const xp=checklistDone*10+quizCorrect*15+abiDone*8+miniDone*6;const level=Math.floor(xp/60)+1;const pct=Math.min(100,Math.round((xp%60)/60*100));const badges=[];if(checklistDone>=5) badges.push("Grundlagen-Scout"); if(quizCorrect>=4) badges.push("Quizmeister"); if(abiDone>=3) badges.push("Abiturstarter"); if(miniDone>=2) badges.push("Klausurmutig"); if(state.streak.count>=3) badges.push("Lernserie"); const msg=quizCorrect===quizTotal&&quizTotal>0?"Stark – das Quiz sitzt. Zeit für Abituraufgaben.":abiDone>=4?"Sehr gut – du arbeitest bereits auf Prüfungsniveau.":checklistDone<4?"Starte mit Grundlagen und Diagrammen.": "Du bist auf einem guten Weg – dranbleiben."; return {checklistDone,quizTotal,quizCorrect,abiDone,miniDone,xp,level,pct,badges,msg};}

function sinusSVG(){const width=720,height=240,axisLeft=60,axisBottom=height/2,shiftDeg=state.diagramMode==="L"?-90:state.diagramMode==="C"?90:0,shift=shiftDeg*Math.PI/180,u=[],i=[];for(let x=0;x<=width;x+=2){const t=(x/width)*2*Math.PI,yU=Math.sin(t*state.frequencyFactor),yI=Math.sin(t*state.frequencyFactor+shift),pyU=height/2-yU*(state.amplitude/10)*(height/2-28),pyI=height/2-yI*(state.amplitude/10)*(height/2-28);u.push(`${x},${pyU}`);i.push(`${x},${pyI}`)}return `<svg viewBox="0 0 ${width} ${height}" style="width:100%;border:1px solid var(--line);border-radius:18px;background:#fff"><line x1="0" y1="${axisBottom}" x2="${width}" y2="${axisBottom}" stroke="currentColor" stroke-width="1" opacity=".3"/><line x1="${axisLeft}" y1="10" x2="${axisLeft}" y2="${height-10}" stroke="currentColor" stroke-width="1" opacity=".3"/><polyline fill="none" stroke="#0f766e" stroke-width="3" points="${u.join(" ")}"/><polyline fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="8 6" points="${i.join(" ")}"/><text x="12" y="18" font-size="12">U / I in V / A</text><text x="${width-42}" y="${axisBottom-10}" font-size="12">t in s</text><text x="${axisLeft-22}" y="34" font-size="11">+Û</text><text x="${axisLeft-14}" y="${axisBottom+4}" font-size="11">0</text><text x="${axisLeft-22}" y="${height-26}" font-size="11">-Û</text></svg>`}

function renderGrundlagen(){const c=computeValues();return `<div class="grid grid-2"><div class="card"><h2>Gleichspannung und Wechselspannung</h2><p class="small muted">Bei Gleichspannung bleibt die Polarität konstant. Bei Wechselspannung ändern sich Betrag und Polarität periodisch mit der Zeit. Für viele technische Betrachtungen wird ein sinusförmiger Verlauf angenommen.</p><div class="formula">u(t) = Û · sin(ω · t + φ)</div><div class="grid grid-2" style="margin-top:12px"><div class="mini"><strong>Gleichspannung</strong><br><span class="small muted">konstante Richtung, konstante Polarität</span></div><div class="mini"><strong>Wechselspannung</strong><br><span class="small muted">periodischer Verlauf, Richtungswechsel</span></div><div class="mini"><strong>Stromnetz</strong><br><span class="small muted">50 Hz bedeutet 50 Perioden pro Sekunde</span></div><div class="mini"><strong>230 V</strong><br><span class="small muted">im Stromnetz meist Effektivwert</span></div></div></div><div class="card"><h2>Zusammenhang von T, f und ω</h2><div class="formula">T = Periodendauer</div><div class="formula" style="margin-top:10px">f = 1 / T</div><div class="formula" style="margin-top:10px">ω = 2πf</div><div class="mini" style="margin-top:12px"><strong>Deutung:</strong> Die Frequenz gibt an, wie oft sich ein periodischer Vorgang pro Sekunde wiederholt. Die Kreisfrequenz beschreibt denselben Vorgang in der Winkeldarstellung.</div><div class="feedback warnbox"><strong>Typischer Fehler:</strong> T und f werden oft vertauscht.</div></div></div><div class="grid grid-2"><div class="card"><h2>Effektivwert und Scheitelwert</h2><p class="small muted">Der Effektivwert ist der Gleichspannungswert, der in einem ohmschen Widerstand dieselbe elektrische Wirkung erzielt wie die betrachtete Wechselspannung.</p><div class="formula">U${sub("eff")} = Û / √2</div><div class="formula" style="margin-top:10px">Û = U${sub("eff")} · √2</div><div style="margin-top:12px"><label class="label">Effektivwert U${sub("eff")} in V</label><input type="text" value="${state.uEffValue}" oninput="setField('uEffValue', this.value)"></div><div class="mini soft-mint" style="margin-top:12px"><strong>Scheitelwert:</strong> ${formatNumber(c.uHat,2)} V</div><div class="mini" style="margin-top:12px"><strong>Beispiel Stromnetz:</strong> 230 V entsprechen ungefähr ${formatNumber(230*Math.sqrt(2),1)} V als Scheitelwert.</div></div><div class="card"><h2>Zentrale fachliche Aussagen</h2><div class="mini"><strong>Deutungsfrage:</strong> Warum ist der Scheitelwert größer als 230 V, obwohl im Stromnetz von 230 V gesprochen wird?</div><div class="feedback ok"><strong>Lösungsidee:</strong> Die 230 V bezeichnen den Effektivwert, nicht den Maximalwert.</div><div class="mini"><strong>Merksatz:</strong> In Klausuren sollte klar zwischen Augenblickswert, Scheitelwert und Effektivwert unterschieden werden.</div></div></div>`}
function renderSinus(){return `<div class="card"><div class="section-title-row"><h2>Zeitdiagramme von Spannung und Stromstärke</h2><span class="marker dark">visualisieren</span></div><div class="btnrow" style="margin-top:12px"><button class="btn ${state.diagramMode==='R'?'primary':''}" onclick="setDiagramMode('R')">Widerstand</button><button class="btn ${state.diagramMode==='L'?'primary':''}" onclick="setDiagramMode('L')">Spule</button><button class="btn ${state.diagramMode==='C'?'primary':''}" onclick="setDiagramMode('C')">Kondensator</button></div><div style="margin-top:12px">${sinusSVG()}</div><div class="grid grid-2" style="margin-top:14px"><div><div class="small"><strong>Amplitude:</strong> ${state.amplitude}</div><input type="range" min="1" max="10" step="1" value="${state.amplitude}" oninput="setAmplitude(this.value)" style="width:100%"></div><div><div class="small"><strong>Frequenzfaktor:</strong> ${state.frequencyFactor}</div><input type="range" min="1" max="5" step="1" value="${state.frequencyFactor}" oninput="setFrequencyFactor(this.value)" style="width:100%"></div></div><div class="grid grid-3" style="margin-top:12px"><div class="mini"><strong>Durchgezogen:</strong><br><span class="small muted">Spannung U</span></div><div class="mini"><strong>Gestrichelt:</strong><br><span class="small muted">Stromstärke I</span></div><div class="mini"><strong>Phasenlage:</strong><br><span class="small muted">Bei R phasengleich, bei L eilt U voraus, bei C eilt I voraus.</span></div></div></div><div class="card"><h2>Operatorenorientierte Diagrammaufgaben</h2>${diagramTasks.map(t=>`<div class="mini" style="margin-top:12px"><div class="btnrow"><span class="marker">Operator: ${t.operator}</span><span class="marker dark">Diagrammdeutung</span></div><div style="font-weight:700;margin-top:10px">${physicsText(t.prompt)}</div><button class="btn" style="margin-top:10px" onclick="toggleDiagramSolution(${t.id})">${state.openDiagramSolution===t.id?'Lösung ausblenden':'Lösung einblenden'}</button>${state.openDiagramSolution===t.id?`<div class="feedback ok">${physicsText(t.solution)}</div>`:''}</div>`).join("")}</div>`}
function renderRLC(){const current=rlcData[state.rlcMode];return `<div class="card dark"><div class="badge" style="background:#ffffff14;color:#fff;border-color:#ffffff20">Bauelemente im Wechselstromkreis</div><h2 style="font-size:2rem;margin-top:10px">R · L · C als Herzstück des Themas</h2><p class="small" style="color:#d7efea">Hier werden ohmscher Widerstand, induktiver Blindwiderstand und kapazitiver Blindwiderstand systematisch verglichen. Fachlich wichtig ist: Für die gesamte Schaltung gilt der Wechselstromwiderstand Z = U${sub("eff")} / I${sub("eff")}. Bei der idealen Spule und beim idealen Kondensator beschreibt man die frequenzabhängigen Anteile mit X${sub("L")} bzw. X${sub("C")}.</p><div class="grid grid-2"><div class="mini" style="background:#ffffff12;color:#fff;border-color:#ffffff20"><strong>Formel</strong><br>R, X${sub("L")}, X${sub("C")} korrekt zuordnen</div><div class="mini" style="background:#ffffff12;color:#fff;border-color:#ffffff20"><strong>Grundidee</strong><br>Z = U${sub("eff")} / I${sub("eff")}</div><div class="mini" style="background:#ffffff12;color:#fff;border-color:#ffffff20"><strong>Phase</strong><br>phasengleich, voreilend, nacheilend</div><div class="mini" style="background:#ffffff12;color:#fff;border-color:#ffffff20"><strong>Deutung</strong><br>größer oder kleiner mit f</div></div></div><div class="card"><h2>Vergleichsmatrix</h2><div style="overflow-x:auto"><table><thead><tr><th>Bauelement</th><th>Art</th><th>Formel</th><th>Phasenlage</th><th>Frequenzverhalten</th></tr></thead><tbody>${Object.values(rlcData).map(item=>`<tr><td><strong>${item.label}</strong></td><td>${item.type}</td><td>${physicsText(item.formula)}</td><td>${item.phase}</td><td>${physicsText(item.frequency)}</td></tr>`).join("")}</tbody></table></div></div><div class="grid grid-2"><div class="card"><h2>Interaktive Auswahl</h2><div class="btnrow" style="margin-top:12px"><button class="btn ${state.rlcMode==='R'?'primary':''}" onclick="setRlcMode('R')">Ohmscher Leiter</button><button class="btn ${state.rlcMode==='L'?'primary':''}" onclick="setRlcMode('L')">Spule</button><button class="btn ${state.rlcMode==='C'?'primary':''}" onclick="setRlcMode('C')">Kondensator</button></div><div class="mini ${current.soft}" style="margin-top:12px"><div class="topic-title" style="font-size:1.2rem">${current.label}</div><div class="formula">${physicsText(current.formula)}</div><div class="mini" style="margin-top:10px"><strong>Art:</strong> ${current.type}</div><div class="mini" style="margin-top:10px"><strong>Phasenlage:</strong> ${current.phase}</div><div class="mini" style="margin-top:10px"><strong>Frequenzverhalten:</strong> ${physicsText(current.frequency)}</div></div></div><div class="card"><h2>Deutung in Klausursprache</h2><div class="mini soft-mint"><strong>Typische Aussage:</strong> ${current.phase}</div><div class="mini" style="margin-top:10px"><strong>Physikalische Bedeutung:</strong> ${physicsText(current.meaning)}</div><div class="mini" style="margin-top:10px"><strong>Typische Fehlvorstellung:</strong> ${physicsText(current.error)}</div><div class="mini" style="margin-top:10px"><strong>Klausurhinweis:</strong> Ein Zahlenwert allein reicht nicht. Erwartet wird zusätzlich eine sprachliche Deutung, etwa „phasengleich“, „um 90° voreilend“, „um 90° nacheilend“ oder „nimmt mit der Frequenz zu/ab“.</div><div class="feedback warnbox"><strong>Merksatz:</strong> R bleibt gleich, bei der Spule wächst X${sub("L")} mit f, beim Kondensator sinkt X${sub("C")} mit f.</div></div></div>`}
function renderCalcTasks(){return calculationTasks.map(task=>{const aKey=`calc_${task.id}`,hKey=`hint_${task.id}`,sKey=`sol_${task.id}`;if(!(aKey in state)) state[aKey]="";if(!(hKey in state)) state[hKey]=false;if(!(sKey in state)) state[sKey]=false;const numeric=parseGermanNumber(state[aKey]),isValid=Number.isFinite(numeric),isCorrect=isValid&&Math.abs(numeric-task.expected)<=task.tolerance,checked=state[aKey]!=="";return `<div class="card"><div class="btnrow"><span class="marker">Operator: ${task.operator}</span><span class="marker warn">typische Fehlerquelle: Einheiten</span></div><h3 style="margin-top:12px">${task.level}: Rechenaufgabe ${task.id}</h3><p class="small">${physicsText(task.prompt)}</p><div class="grid" style="grid-template-columns:1fr auto;margin-top:12px"><input type="text" value="${state[aKey]}" oninput="setDynamicField('${aKey}', this.value)" placeholder="Ergebnis in ${task.unit}"><div class="mini soft-mint center">${task.unit}</div></div><div class="btnrow" style="margin-top:12px"><button class="btn" onclick="toggleDynamic('${hKey}')">${state[hKey]?'Hinweis ausblenden':'Hinweis einblenden'}</button><button class="btn" onclick="toggleDynamic('${sKey}')">${state[sKey]?'Lösung ausblenden':'Lösung einblenden'}</button></div>${state[hKey]?`<div class="feedback ok">${physicsText(task.hint)}</div>`:''}${checked?`<div class="feedback ${isCorrect?'ok':'warnbox'}"><strong>${isCorrect?'Treffer +10 XP mental' : 'Prüfen Sie Ihren Rechenweg'}</strong><br>${isCorrect?`Das Ergebnis liegt im richtigen Bereich: ${formatNumber(task.expected,2)} ${task.unit}`:physicsText(task.error)}</div>`:''}${state[sKey]?`<div class="feedback ok">${physicsText(task.solution)}</div>`:''}<div class="mini soft-mint" style="margin-top:12px"><strong>Deutung:</strong> ${physicsText(task.interpretation)}</div></div>`}).join("")}
function renderRechnen(){const c=computeValues();return `<div class="grid grid-2"><div class="card"><div class="section-title-row"><h2>Formeltrainer</h2><span class="marker dark">anwenden</span></div><div class="grid grid-2" style="margin-top:12px"><div><label class="label">Periodendauer T in s</label><input type="text" value="${state.tValue}" oninput="setField('tValue', this.value)"></div><div><label class="label">Frequenz f in Hz</label><input type="text" value="${state.fValue}" oninput="setField('fValue', this.value)"></div><div><label class="label">Induktivität L in H</label><input type="text" value="${state.lValue}" oninput="setField('lValue', this.value)"></div><div><label class="label">Kapazität C in F</label><input type="text" value="${state.cValue}" oninput="setField('cValue', this.value)"></div></div><div class="grid grid-2" style="margin-top:12px"><div class="formula">f = 1 / T = ${formatNumber(c.fFromT,2)} Hz</div><div class="formula">ω = 2πf = ${formatNumber(c.omega,2)} s⁻¹</div><div class="formula">X${sub("L")} = ω·L = ${formatNumber(c.xl,2)} Ω</div><div class="formula">X${sub("C")} = 1 / (ω·C) = ${formatNumber(c.xc,2)} Ω</div><div class="formula">Û = U${sub("eff")} · √2 = ${formatNumber(c.uHat,2)} V</div><div class="formula">f${sub("0")} = 1 / (2π√(LC)) = ${formatNumber(c.resonance,2)} Hz</div></div></div><div class="card"><h2>Vertiefung: Reihenschwingkreis</h2><div class="mini"><strong>Qualitative Idee:</strong> Im Reihenschwingkreis wirken Spule und Kondensator gegeneinander. Bei einer bestimmten Frequenz können sich ihre Blindwiderstände betragsmäßig ausgleichen.</div><div class="formula" style="margin-top:12px">f${sub("0")} = 1 / (2π√(LC))</div><div class="mini" style="margin-top:12px"><strong>Thomsonsche Gleichung:</strong> Sie beschreibt die Eigen- bzw. Resonanzfrequenz des idealisierten LC-Systems.</div><div class="feedback warnbox"><strong>Wichtig für Klausuren:</strong> Ein qualitativer Zusammenhang reicht oft nicht. Man soll zusätzlich beschreiben, was sich physikalisch bei Resonanz ändert.</div><div class="mini soft-mint"><strong>Merksatz:</strong> Reihenschwingkreis und Thomsonsche Gleichung sind die Brücke von den Blindwiderständen zur Resonanzidee.</div></div></div>${renderCalcTasks()}`}
function renderQuestion(q){const selected=state.quizAnswers[q.id],isCorrect=selected===q.correct;return `<div class="card"><div class="btnrow"><span class="marker">Operator: ${q.operator}</span><span class="marker dark">klausurrelevant</span></div><h3 style="margin-top:12px">Begriffsaufgabe ${q.id}</h3><p class="small">${physicsText(q.prompt)}</p><div>${q.options.map((opt,i)=>`<button class="choice ${selected===i?'sel':''}" onclick="setQuizAnswer(${q.id}, ${i})">${physicsText(opt)}</button>`).join("")}</div>${selected!==undefined?`<div class="feedback ${isCorrect?'ok':'warnbox'}"><strong>${isCorrect?'Richtig' : 'Noch nicht vollständig richtig'}</strong><br>${physicsText(q.explanation)}</div>`:''}</div>`}
function renderTraining(){const g=gamification();return `<div class="card"><div class="section-title-row"><h2>Hinweis zum Klausurstil</h2><span class="marker dark">prüfungsnah</span></div><p class="small muted">Achte bei den Aufgaben nicht nur auf das Rechnen, sondern auch auf die sprachliche Präzision: <strong>beschreiben</strong>, <strong>erläutern</strong>, <strong>begründen</strong>, <strong>deuten</strong> und <strong>beurteilen</strong> verlangen unterschiedlich tiefe Antworten.</p><div class="grid grid-3"><div class="mini soft-mint"><strong>Quizstand</strong><div class="stat-num">${g.quizCorrect}/${g.quizTotal}</div><div class="small muted">richtige Antworten</div></div><div class="mini soft-amber"><strong>Motivation</strong><div class="small">Jede richtige Antwort stärkt dein Fachvokabular und deine Klausurroutine.</div></div><div class="mini soft-rose"><strong>Nächster Schritt</strong><div class="small">Ab 4 richtigen Antworten lohnt sich direkt der Wechsel zu den Abituraufgaben.</div></div></div></div><div class="grid grid-3">${ptaQuestions.map(item=>`<div class="card"><h3>${item.title}</h3><div class="mini"><strong>Arbeitsauftrag:</strong> ${physicsText(item.task)}</div><div class="mini soft-mint" style="margin-top:10px"><strong>Hinweis:</strong> ${physicsText(item.hint)}</div><div style="margin-top:10px"><span class="marker dark">PTA-Transfer</span></div></div>`).join("")}</div>${trainingQuestions.map(renderQuestion).join("")}<div class="card"><h2>Datenschutz-Hinweis für den Schulgebrauch</h2><div class="feedback warnbox"><strong>Hinweis:</strong> Diese App speichert Lernstände nur lokal im Browser. Es sollen keine personenbezogenen Daten eingegeben werden.</div></div>`}
function abiturInteractiveCard(task,idx){const key=`abi_${idx}`,showKey=`show_${idx}`;if(!(key in state.abiturAnswers)) state.abiturAnswers[key]="";if(!(showKey in state.abiturShows)) state.abiturShows[showKey]=false;const ans=state.abiturAnswers[key]||"";return `<div class="card"><div class="btnrow"><span class="marker">Operator: ${task.operator}</span><span class="marker dark">Originalbezug ${task.year}</span></div><h3 style="margin-top:12px">Abitur ${task.year}: ${task.title}</h3><div class="mini"><strong>Aufgabe:</strong> ${physicsText(task.prompt)}</div><div class="mini soft-sky" style="margin-top:10px"><strong>Hinweis:</strong> ${physicsText(task.hint)}</div>${task.kind==="calc"?`<div style="margin-top:12px"><label class="label">Eigene Rechnung / Ergebnis</label><input type="text" value="${ans}" oninput="setAbiAnswer('${key}', this.value)" placeholder="Eigenes Ergebnis oder Kurzlösung"></div>`:`<div style="margin-top:12px"><label class="label">Eigene Antwort / Stichpunkte</label><textarea oninput="setAbiAnswer('${key}', this.value)" placeholder="Schreiben Sie hier Ihre eigene Lösungsidee ...">${ans}</textarea></div>`}<div class="btnrow" style="margin-top:12px"><button class="btn" onclick="toggleAbiShow('${showKey}')">${state.abiturShows[showKey]?'Musterlösung ausblenden':'Musterlösung einblenden'}</button></div>${state.abiturShows[showKey]?`<div class="feedback ok"><strong>Musterlösung:</strong><br>${physicsText(task.solution)}</div>`:""}</div>`}
function renderAbitur(){const g=gamification();return `<div class="card dark"><div class="section-title-row"><h2>Abituraufgaben aus den Originalunterlagen</h2><span class="marker rose">🏆 Prüfungsmodus</span></div><p class="small" style="color:#d7efea">Dieser Bereich bündelt die einschlägigen Aufgaben aus den hochgeladenen Abiturunterlagen und übersetzt sie in ein lernapp-taugliches Format. Schwerpunkt ist der RC-Wechselstromkreis mit Kondensator. Zusätzlich gibt es eine technische Vertiefung aus dem Kondensatormikrofon-Kontext.</p><div class="grid grid-3"><div class="mini" style="background:#ffffff12;color:#fff;border-color:#ffffff20"><strong>Bearbeitet</strong><div style="font-size:1.5rem;font-weight:900;margin-top:6px">${g.abiDone}</div></div><div class="mini" style="background:#ffffff12;color:#fff;border-color:#ffffff20"><strong>Ziel</strong><div class="small" style="margin-top:8px">Mindestens 3 Aufgaben sauber ausarbeiten</div></div><div class="mini" style="background:#ffffff12;color:#fff;border-color:#ffffff20"><strong>Fachhinweis</strong><div class="small" style="margin-top:8px">Im hochgeladenen Satz liegt der Schwerpunkt klar auf Kondensator / RC-Kreis.</div></div></div></div>${abiturTasks.map(abiturInteractiveCard).join("")}`}
function renderMini(){const written=Object.values(state.miniDrafts).filter(v=>String(v).trim()!=="").length;return `<div class="card dark"><div class="section-title-row"><h2>Mini-Klausur: Wechselspannung an einer Spule</h2><span class="marker rose">⭐ Klausursimulation</span></div><p class="small" style="color:#d7efea">Diese Mini-Klausur besteht aus vier aufeinander aufbauenden Teilaufgaben. Sie verbindet Beschreibung, Berechnung, Deutung und Beurteilung.</p><div class="grid grid-2"><div class="mini" style="background:#ffffff12;color:#fff;border-color:#ffffff20"><strong>Kontext:</strong><div class="small" style="margin-top:8px">In einem Messaufbau wird eine Spule mit der Induktivität L = 80 mH an eine Wechselspannungsquelle mit f = 50 Hz angeschlossen.</div></div><div class="mini" style="background:#ffffff12;color:#fff;border-color:#ffffff20"><strong>Fortschritt:</strong><div style="font-size:1.5rem;font-weight:900;margin-top:8px">${written}/4</div></div></div></div>${miniExamTasks.map(task=>{const key='mini_'+task.id;if(!(key in state.miniDrafts)) state.miniDrafts[key]='';return `<div class="card"><span class="marker">Operator: ${task.operator}</span><h3 style="margin-top:12px">${task.title}</h3><p class="small">${physicsText(task.prompt)}</p><textarea oninput="setMiniDraft('${key}', this.value)" placeholder="Notieren Sie hier Ihren Antwortentwurf …">${state.miniDrafts[key]}</textarea><details class="mini" style="margin-top:12px"><summary><strong>Erwartungshorizont</strong></summary><div class="small" style="margin-top:10px">${physicsText(task.expectation)}</div></details></div>`}).join("")}`}
function renderCheckliste(){const done=state.checklist.filter(Boolean).length,progress=Math.round(done/checklistItems.length*100),g=gamification();return `<div class="card"><div class="section-title-row"><h2>Checkliste zur Klausurvorbereitung</h2><span class="marker dark">systematisch</span></div><div class="progress" style="margin-top:12px"><span style="width:${progress}%"></span></div><div class="small muted" style="margin-top:8px">${done} von ${checklistItems.length} Punkten markiert</div><div class="grid grid-3" style="margin-top:12px"><div class="achievement"><span>🎯</span><div><strong>Zielklarheit</strong><div class="small muted">Checkliste strukturiert dein Lernen.</div></div></div><div class="achievement"><span>🏅</span><div><strong>Badges</strong><div class="small muted">${g.badges.length?g.badges.join(", "):"Noch keine Badges freigeschaltet."}</div></div></div><div class="achievement"><span>🔥</span><div><strong>Serie</strong><div class="small muted">${state.streak.count} Lerntag(e) in Folge.</div></div></div></div><div class="grid" style="gap:12px;margin-top:12px">${checklistItems.map((item,i)=>`<label class="checkitem"><input type="checkbox" ${state.checklist[i]?'checked':''} onchange="toggleChecklist(${i}, this.checked)"><span class="small">${physicsText(item)}</span></label>`).join("")}</div></div>`}
function render(){updateStreak();renderNav();const content=document.getElementById("content");const views={start:renderStart,grundlagen:renderGrundlagen,sinus:renderSinus,rlc:renderRLC,rechnen:renderRechnen,training:renderTraining,abitur:renderAbitur,miniklausur:renderMini,checkliste:renderCheckliste};content.innerHTML=views[state.activeTab]()}
function goTab(id){state.activeTab=id;render()} function setField(k,v){state[k]=v;render()} function setAmplitude(v){state.amplitude=Number(v);render()} function setFrequencyFactor(v){state.frequencyFactor=Number(v);render()} function setDiagramMode(m){state.diagramMode=m;render()} function setRlcMode(m){state.rlcMode=m;render()} function toggleDiagramSolution(id){state.openDiagramSolution=state.openDiagramSolution===id?null:id;render()} function setQuizAnswer(id,index){state.quizAnswers[id]=index;saveQuiz();render()} function toggleChecklist(i,checked){state.checklist[i]=checked;saveChecklist();render()} function setDynamicField(k,v){state[k]=v;render()} function toggleDynamic(k){state[k]=!state[k];render()} function setAbiAnswer(k,v){state.abiturAnswers[k]=v;saveAbi()} function toggleAbiShow(k){state.abiturShows[k]=!state.abiturShows[k];render()} function setMiniDraft(k,v){state.miniDrafts[k]=v;saveMini()}
window.goTab=goTab; window.setField=setField; window.setAmplitude=setAmplitude; window.setFrequencyFactor=setFrequencyFactor; window.setDiagramMode=setDiagramMode; window.setRlcMode=setRlcMode; window.toggleDiagramSolution=toggleDiagramSolution; window.setQuizAnswer=setQuizAnswer; window.toggleChecklist=toggleChecklist; window.setDynamicField=setDynamicField; window.toggleDynamic=toggleDynamic; window.setAbiAnswer=setAbiAnswer; window.toggleAbiShow=toggleAbiShow; window.setMiniDraft=setMiniDraft;
render();
</script>
