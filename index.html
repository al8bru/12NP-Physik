<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wechselspannung Lernapp – Aufgaben gruppiert</title>
  <style>
    :root{
      --bg1:#f7fffc; --bg2:#edf8f5; --bg3:#dfeeea;
      --card:#ffffffee; --text:#163434; --muted:#52706d;
      --line:#b9e3d9; --teal:#0f766e; --teal2:#0b5f59;
      --mint:#e9fbf4; --sky:#eef7ff; --amber:#fff7dc; --rose:#fff1f5;
      --ok:#edf9f0; --okline:#b9e4c6; --warn:#fff6dd; --warnline:#eed18a;
      --shadow:0 16px 40px rgba(28,84,72,.10); --radius:28px;
      --shadow-soft:0 10px 24px rgba(28,84,72,.08);
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top, var(--bg1) 0%, var(--bg2) 36%, var(--bg3) 100%)}
    .wrap{max-width:1200px;margin:0 auto;padding:16px}
    .nav{position:sticky;top:0;z-index:20;display:flex;flex-wrap:wrap;gap:8px;padding:12px;border:1px solid var(--line);border-radius:24px;background:#ffffffdb;backdrop-filter:blur(10px);box-shadow:0 10px 28px rgba(44,95,82,.08);margin-bottom:18px}
    .tab{border:1px solid var(--line);background:#fff;color:var(--teal2);border-radius:16px;padding:10px 14px;font-weight:700;cursor:pointer;transition:transform .14s ease, background .18s ease, box-shadow .18s ease}
    .tab:hover{transform:translateY(-1px);box-shadow:var(--shadow-soft)}
    .tab.active{background:var(--teal);color:#fff;border-color:var(--teal)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:18px}
    .hero{background:radial-gradient(circle at top right, #ffffff 0%, #f6fffb 35%, #ebfaf5 70%, #e1f2ed 100%);overflow:hidden;position:relative}
    .hero::after{content:"";position:absolute;right:-80px;top:-80px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle, rgba(15,118,110,.16) 0%, rgba(15,118,110,0) 70%);pointer-events:none}
    .dark{background:linear-gradient(135deg,#0d403b,#114752 72%);color:#eefaf8;border-color:#11443e}
    h1,h2,h3{margin:0 0 10px 0;line-height:1.12}
    h1{font-size:clamp(2rem,4vw,3.5rem)} h2{font-size:clamp(1.35rem,2vw,1.9rem)} h3{font-size:1.08rem}
    p{margin:0 0 10px 0;line-height:1.7}
    .muted{color:var(--muted)}
    .grid{display:grid;gap:16px}
    .grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    @media (max-width: 950px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}
    .topic-btn{width:100%;text-align:left;cursor:pointer;border:1px solid var(--line);background:#fff;border-radius:22px;padding:16px;transition:.18s}
    .topic-btn:hover{background:#f1fbf7;transform:translateY(-2px);box-shadow:var(--shadow-soft)}
    .topic-title{font-weight:800;color:var(--teal2);margin-bottom:8px}
    .mini{border:1px solid var(--line);background:#fff;border-radius:18px;padding:14px}
    .badge,.marker{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:.76rem;font-weight:800}
    .badge{background:#dff5ef;color:#0c5c55;border:1px solid #b8e5d8}
    .marker{background:#edf9f5;color:#0f766e;border:1px solid #bfe3db}
    .marker.warn{background:#fff1c9;color:#8a6500;border-color:#f2d37c}
    .marker.dark{background:var(--teal);color:#fff;border-color:var(--teal)}
    .btnrow{display:flex;gap:10px;flex-wrap:wrap}
    .btn{border:1px solid var(--line);border-radius:16px;padding:10px 14px;background:#fff;color:var(--teal2);font-weight:800;cursor:pointer;transition:transform .14s ease, box-shadow .18s ease}
    .btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-soft)}
    .btn.primary{background:var(--teal);color:#fff;border-color:var(--teal)}
    .formula{border:1px solid var(--line);background:linear-gradient(135deg,#eefaf6,#ffffff);border-radius:18px;padding:13px 14px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;overflow-x:auto}
    .soft-mint{background:var(--mint)} .soft-sky{background:var(--sky)} .soft-amber{background:var(--amber)} .soft-rose{background:var(--rose)}
    .label{font-size:.92rem;font-weight:700;margin-bottom:6px;display:block}
    input[type="text"], textarea, select{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:16px;font:inherit;color:var(--text);background:#fff}
    textarea{min-height:130px;resize:vertical}
    .choice{width:100%;text-align:left;border:1px solid var(--line);background:#fff;border-radius:16px;padding:12px 14px;cursor:pointer;transition:.16s ease}
    .choice:hover{background:#f5fcf8}
    .choice.sel{border-color:var(--teal);background:#eefaf6}
    .feedback{margin-top:12px;padding:12px 14px;border-radius:16px;border:1px solid var(--line)}
    .ok{background:var(--ok);border-color:var(--okline)}
    .warnbox{background:var(--warn);border-color:var(--warnline)}
    .progress{width:100%;height:12px;border-radius:999px;background:#def0ea;overflow:hidden}
    .progress > span{display:block;height:100%;background:linear-gradient(90deg,#0f766e,#14b8a6)}
    .small{font-size:.94rem;line-height:1.7}
    .checkitem{display:flex;gap:12px;align-items:flex-start;border:1px solid var(--line);background:#fff;border-radius:18px;padding:14px}
    .sub{font-size:.72em;vertical-align:sub}
    .section-title-row{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px}
    details{border:1px solid var(--line);background:#fff;border-radius:18px;padding:12px 14px}
    details summary{cursor:pointer;font-weight:800;color:var(--teal2)}
    .converter-row{display:grid;grid-template-columns:1fr 160px 160px;gap:12px}
    @media (max-width: 850px){.converter-row{grid-template-columns:1fr}}
  </style>
</head>

<script>
const NAV_ITEMS=[["start","Start"],["grundlagen","Grundlagen"],["sinus","Sinuskurve"],["rlc","R · L · C"],["rechnen","Rechnen"],["training","Klausurvorbereitung"],["aufgaben","Aufgaben"],["checkliste","Checkliste"]];
const checklistItems=["Ich kann Gleichspannung und Wechselspannung unterscheiden.","Ich kann Periodendauer T, Frequenz f und Kreisfrequenz ω sicher zuordnen.","Ich kann Effektivwert und Scheitelwert unterscheiden und umrechnen.","Ich kann die Phasenlage von U und I in Zeitdiagrammen fachsprachlich korrekt beschreiben.","Ich kann ohmschen Widerstand, induktiven Blindwiderstand und kapazitiven Blindwiderstand sicher unterscheiden.","Ich kann X_L und X_C korrekt berechnen und physikalisch deuten.","Ich kann begründen, wie sich Spule und Kondensator bei steigender Frequenz verhalten.","Ich kann den Reihenschwingkreis qualitativ beschreiben und die Thomsonsche Gleichung zuordnen.","Ich kann einen PTA-/Labor-Kontext fachlich analysieren.","Ich kann operatorenorientierte Klausuraufgaben bearbeiten."];

const ptaBlocks=[{title:"Signalverarbeitung",text:"Frequenzabhängiges Verhalten von Spule und Kondensator für Filter und Messschaltungen deuten."},{title:"Elektronische Messanordnungen",text:"Bauelemente fachlich begründet auswählen, Messergebnisse auswerten und technische Entscheidungen treffen."},{title:"Struktur",text:"Erst sicher verstehen, dann rechnen, dann deuten und begründen."}];
const rlcData={R:{label:"Ohmscher Leiter",type:"ohmscher Widerstand",formula:"R",phase:"U und I sind phasengleich (Δφ = 0°).",frequency:"frequenzunabhängig",meaning:"Der ohmsche Widerstand ist der Referenzfall im Wechselstromkreis. Sein Wert bleibt unabhängig von der Frequenz konstant.",error:"Typische Verwechslung: Auch im Wechselstromkreis bleibt beim idealen ohmschen Leiter keine Phasenverschiebung zurück.",soft:"soft-mint"},L:{label:"Spule",type:"induktiver Blindwiderstand",formula:"X_L = ω · L = 2πfL",phase:"Die Spannung eilt der Stromstärke um 90° voraus.",frequency:"X_L steigt mit f",meaning:"Je höher die Frequenz, desto größer wird der induktive Blindwiderstand. Die Spule hemmt schnelle Stromänderungen besonders stark.",error:"Typische Verwechslung: Die Spule wird bei hoher Frequenz nicht durchlässiger, sondern wirkt stärker hemmend.",soft:"soft-sky"},C:{label:"Kondensator",type:"kapazitiver Blindwiderstand",formula:"X_C = 1 / (ω · C) = 1 / (2πfC)",phase:"Die Stromstärke eilt der Spannung um 90° voraus.",frequency:"X_C sinkt mit f",meaning:"Je höher die Frequenz, desto kleiner wird der kapazitive Blindwiderstand. Der Kondensator wird für Wechselstrom durchlässiger.",error:"Typische Verwechslung: Beim Kondensator eilt nicht die Spannung voraus, sondern die Stromstärke.",soft:"soft-mint"}};
const diagramTasks=[{id:1,operator:"beschreiben",prompt:"Beschreiben Sie für den ohmschen Leiter die Lage von Spannung U und Stromstärke I im Zeitdiagramm.",solution:"Beim ohmschen Leiter sind Spannung und Stromstärke phasengleich. Maxima, Minima und Nulldurchgänge treten gleichzeitig auf."},{id:2,operator:"erläutern",prompt:"Erläutern Sie, woran man im Zeitdiagramm erkennt, dass es sich um eine Spule handelt.",solution:"Die Spannung erreicht charakteristische Punkte früher als die Stromstärke. U eilt I um 90° voraus."},{id:3,operator:"begründen",prompt:"Begründen Sie, weshalb beim Kondensator die Stromstärke der Spannung voreilt.",solution:"Beim idealen Kondensator ist die Stromstärke an die Spannungsänderung gekoppelt. Deshalb reagiert I früher als U und eilt um 90° voraus."},{id:4,operator:"deuten",prompt:"Deuten Sie die Aussage: Die gestrichelte Kurve liegt im Zeitdiagramm links von der durchgezogenen Kurve.",solution:"Liegt die Stromstärke links von der Spannung, dann eilt die Stromstärke voraus. Das ist ein Hinweis auf einen Kondensator."}];
const trainingQuestions=[{id:1,operator:"erläutern",prompt:"Welche Größe ist der Kehrwert der Periodendauer T?",options:["Amplitude","Frequenz","Effektivwert","Phasenwinkel"],correct:1,explanation:"Es gilt f = 1 / T. Die Frequenz gibt an, wie viele vollständige Perioden pro Sekunde auftreten."},{id:2,operator:"begründen",prompt:"Was passiert mit X_C, wenn die Frequenz größer wird?",options:["X_C wird größer","X_C bleibt konstant","X_C wird kleiner","X_C wird null"],correct:2,explanation:"Da X_C = 1 / (2πfC) gilt, sinkt X_C bei steigender Frequenz. Der Kondensator wird dadurch für Wechselstrom durchlässiger."},{id:3,operator:"erläutern",prompt:"Welche Aussage beschreibt die ideale Spule richtig?",options:["U und I sind phasengleich.","Die Spannung folgt der Stromstärke nach.","Die Spannung eilt der Stromstärke voraus.","X_L sinkt mit der Frequenz."],correct:2,explanation:"Bei der idealen Spule eilt die Spannung U der Stromstärke I um 90° voraus."},{id:4,operator:"berechnen",prompt:"Welche Formel beschreibt den Effektivwert einer sinusförmigen Wechselspannung?",options:["U_eff = Û / 2","U_eff = Û / √2","U_eff = Û²","U_eff = Û / 2π"],correct:1,explanation:"Für sinusförmige Wechselspannung gilt U_eff = Û / √2. Umgekehrt gilt Û = U_eff · √2."},{id:5,operator:"beurteilen",prompt:"Welches Bauelement hemmt bei sehr hoher Frequenz den Stromfluss am stärksten?",options:["Kondensator","Spule","Keines von beiden","Immer der ohmsche Leiter"],correct:1,explanation:"Der induktive Blindwiderstand X_L wächst mit der Frequenz. Deshalb hemmt die Spule hohe Frequenzen besonders stark."},{id:6,operator:"deuten",prompt:"Die Stromstärke eilt der Spannung voraus. Welches Bauelement ist am wahrscheinlichsten beteiligt?",options:["Ohmscher Leiter","Spule","Kondensator","Nur aus dem Effektivwert bestimmbar"],correct:2,explanation:"Wenn die Stromstärke der Spannung voraus eilt, spricht das für das Verhalten eines Kondensators."}];
const ptaQuestions=[{title:"Filterwirkung in einer Schaltung",task:"Arbeitsauftrag: Begründen Sie, warum die Frequenzabhängigkeit von Spule und Kondensator für Filteranwendungen wichtig ist.",hint:"Spule und Kondensator verändern ihren Blindwiderstand mit der Frequenz in entgegengesetzter Weise."},{title:"Bauteilauswahl in der Messtechnik",task:"Arbeitsauftrag: Beurteilen Sie, welches Bauelement bei hoher Frequenz eher hemmend wirkt und welches eher durchlässig wird.",hint:"Bei der Spule wächst X_L mit f, beim Kondensator sinkt X_C mit f."}];
const miniExamTasks=[{id:"a",operator:"beschreiben",title:"Klausurbaustein 1",prompt:"Beschreiben Sie die Phasenlage von Spannung U und Stromstärke I bei einer idealen Spule im Wechselstromkreis.",expectation:"Die Spannung eilt der Stromstärke um 90° voraus. Die Stromstärke läuft nach."},{id:"b",operator:"berechnen",title:"Klausurbaustein 2",prompt:"Gegeben sind L = 80 mH und f = 50 Hz. Berechnen Sie den induktiven Blindwiderstand X_L.",expectation:"Zuerst: L = 0,08 H. Dann: X_L = 2π · 50 · 0,08 ≈ 25,13 Ω."},{id:"c",operator:"deuten",title:"Klausurbaustein 3",prompt:"Deuten Sie das Ergebnis aus Klausurbaustein 2 physikalisch im Hinblick auf den Stromfluss durch die Spule.",expectation:"Ein induktiver Blindwiderstand von etwa 25 Ω bedeutet, dass die Spule dem Wechselstrom einen deutlichen frequenzabhängigen Widerstand entgegensetzt."},{id:"d",operator:"beurteilen",title:"Klausurbaustein 4",prompt:"Beurteilen Sie, ob die Spule bei höherer Frequenz den Stromfluss eher stärker oder eher schwächer hemmt. Begründen Sie physikalisch.",expectation:"Die Spule hemmt bei höherer Frequenz stärker, weil X_L = 2πfL mit wachsender Frequenz zunimmt."}];
const calculationTasks=[{id:1,level:"Basis",operator:"berechnen",prompt:"Eine Wechselspannung hat die Periodendauer T = 0,02 s. Berechnen Sie die Frequenz f.",expected:50,unit:"Hz",tolerance:0.2,hint:"Nutzen Sie f = 1 / T.",solution:"f = 1 / 0,02 s = 50 Hz",error:"Vermutlich wurde T nicht als Kehrwert eingesetzt oder die Einheit nicht beachtet.",interpretation:"Eine Frequenz von 50 Hz bedeutet, dass pro Sekunde 50 vollständige Perioden auftreten."},{id:2,level:"Klausurniveau",operator:"berechnen",prompt:"Für eine Spule gilt L = 80 mH und f = 50 Hz. Berechnen Sie den induktiven Blindwiderstand X_L.",expected:25.13,unit:"Ω",tolerance:0.2,hint:"Nutzen Sie X_L = 2πfL und achten Sie darauf, 80 mH in H umzurechnen.",solution:"L = 0,08 H, daher X_L = 2π · 50 · 0,08 ≈ 25,13 Ω",error:"Wahrscheinlich wurde mH nicht in H umgerechnet oder die Formel des Kondensators verwendet.",interpretation:"Ein induktiver Blindwiderstand von rund 25 Ω bedeutet, dass die Spule dem Wechselstrom einen spürbaren frequenzabhängigen Widerstand entgegensetzt."},{id:3,level:"Klausurniveau",operator:"berechnen",prompt:"Für einen Kondensator gilt C = 10 µF und f = 50 Hz. Berechnen Sie den kapazitiven Blindwiderstand X_C.",expected:318.31,unit:"Ω",tolerance:1,hint:"Nutzen Sie X_C = 1 / (2πfC) und wandeln Sie 10 µF in F um.",solution:"C = 10 · 10^-6 F, daher X_C = 1 / (2π · 50 · 10^-5) ≈ 318,31 Ω",error:"Wahrscheinlich wurde µF nicht in F umgerechnet oder die Formel der Spule verwendet.",interpretation:"Der kapazitive Blindwiderstand ist hier deutlich größer als im Spulenbeispiel. Der Kondensator hemmt den Stromfluss bei dieser Frequenz also noch stark."},{id:4,level:"Transfer",operator:"berechnen",prompt:"Im Stromnetz beträgt der Effektivwert 230 V. Berechnen Sie den Scheitelwert Û.",expected:325.27,unit:"V",tolerance:0.5,hint:"Nutzen Sie Û = U_eff · √2.",solution:"Û = 230 V · √2 ≈ 325,27 V",error:"Hier wurde vermutlich Effektivwert und Scheitelwert verwechselt oder mit 2 statt mit √2 multipliziert.",interpretation:"Die 230 V im Stromnetz sind nicht der Spitzenwert. Der maximale Spannungswert liegt tatsächlich bei etwa 325 V."}];
const abiturGroups=[
  {title:"Spule im Wechselstromkreis",intro:"Aufgaben zu idealer und realer Spule, zu Spulendaten und zum frequenzabhängigen Verhalten von X_L.",color:"soft-sky",tasks:[
    {source:"LEIFI",title:"Ermittlung von Spulendaten",operator:"auswerten und berechnen",prompt:"Bestimmen Sie aus Messdaten die Kenngrößen einer Spule, insbesondere den induktiven Widerstand und die Induktivität.",hint:"Nutzen Sie Effektivwerte und gegebenenfalls ein f-X_L-Diagramm. Wenn X_L bekannt ist, kann L direkt über X_L = 2πfL berechnet werden.",solution:"Zunächst wird aus den Messwerten der Wechselstromwiderstand oder direkt der induktive Blindwiderstand ermittelt. Anschließend folgt die Induktivität mit L = X_L / (2πf). Sind mehrere Frequenzen gegeben, hilft ein Vergleich der Werte oder die grafische Auswertung, um die Spulendaten abzusichern."},
    {source:"LEIFI",title:"Wechselstromwiderstand einer idealen Spule (Abitur BY 1996 LK A2-1)",operator:"berechnen und darstellen",prompt:"Berechnen Sie für eine ideale Spule den induktiven Blindwiderstand bei vorgegebenen Frequenzen und stellen Sie das frequenzabhängige Verhalten dar.",hint:"Entscheidend ist die lineare Abhängigkeit X_L = 2πfL. Achten Sie auf eine saubere Umrechnung der Induktivität in Henry.",solution:"Der induktive Blindwiderstand wächst proportional mit der Frequenz. Für jede vorgegebene Frequenz wird X_L mit 2πfL berechnet. Im f-X_L-Diagramm ergibt sich daher ein ansteigender Graph durch den Ursprung."},
    {source:"LEIFI",title:"Wechselstromwiderstand einer realen Spule (Abitur BY 2009 LK A2-1)",operator:"berechnen, vergleichen, entscheiden",prompt:"Untersuchen Sie eine reale Spule, die als Reihenschaltung aus ohmschem Widerstand und idealer Spule modelliert wird. Berechnen Sie den gesamten Wechselstromwiderstand und vergleichen Sie ihn mit dem idealen Fall.",hint:"Für die reale Spule genügt der Betrag Z = √(R² + X_L²). Erst bei höheren Frequenzen nähert sich Z dem rein induktiven Widerstand X_L deutlich an.",solution:"Zuerst wird X_L für die jeweilige Frequenz bestimmt. Danach wird der Gesamtwiderstand der realen Spule mit Z = √(R² + X_L²) berechnet. Bei kleinen Frequenzen spielt der ohmsche Anteil stark mit hinein, bei größeren Frequenzen dominiert zunehmend die Induktivität."},
    {source:"LEIFI",title:"Reale Spule",operator:"deuten und begründen",prompt:"Vergleichen Sie das Verhalten einer realen Spule mit dem einer idealen Spule und begründen Sie die Unterschiede.",hint:"Denken Sie an den Drahtwiderstand der Wicklung. Dadurch ist die reale Spule nicht mehr rein induktiv.",solution:"Die reale Spule besitzt zusätzlich zur Induktivität einen ohmschen Widerstand. Deshalb ist die Phasenverschiebung kleiner als 90° und der Gesamtwiderstand setzt sich aus einem ohmschen und einem induktiven Anteil zusammen. Im Gegensatz zur idealen Spule ist die reale Spule daher energieverlusträchtiger."}
  ]},
  {title:"Kondensator im Wechselstromkreis",intro:"Aufgaben zum kapazitiven Blindwiderstand, zu realen Kondensatoren und zu Anwendungen mit Kondensatoren.",color:"soft-mint",tasks:[
    {source:"LEIFI",title:"Realer Kondensator",operator:"vergleichen und erläutern",prompt:"Beschreiben Sie, warum ein realer Kondensator vom idealen Kondensator abweicht, und erläutern Sie die Folgen für den Wechselstromkreis.",hint:"Reale Bauteile besitzen Verluste und zusätzliche parasitäre Eigenschaften. Dadurch ist das Verhalten nicht mehr rein kapazitiv.",solution:"Ein realer Kondensator besitzt unter anderem Verluste und parasitäre Widerstände. Deshalb ist die Phasenverschiebung nicht exakt 90° und das Bauteil zeigt neben dem kapazitiven Verhalten auch reale Abweichungen. In Schaltungen führt das zu weniger idealen Filter- und Resonanzeigenschaften."},
    {source:"LEIFI",title:"Hochpass",operator:"erklären und anwenden",prompt:"Analysieren Sie einen Hochpass mit Kondensator und erklären Sie, warum hohe Frequenzen besser übertragen werden als niedrige.",hint:"Beim Kondensator sinkt X_C mit zunehmender Frequenz. Prüfen Sie deshalb, wie sich der Spannungsteiler bei kleinen und großen Frequenzen verhält.",solution:"Für kleine Frequenzen ist der kapazitive Blindwiderstand groß; dadurch fällt am Kondensator viel Spannung ab und das Ausgangssignal bleibt klein. Für hohe Frequenzen wird X_C klein, der Kondensator lässt den Wechselstrom besser passieren und das Ausgangssignal steigt. Genau deshalb wirkt die Schaltung als Hochpass."}
  ]},
  {title:"Kondensator und Spule gemeinsam",intro:"Hier werden Spule und Kondensator direkt miteinander verglichen oder in gemeinsamen Schaltungen untersucht.",color:"soft-amber",tasks:[

function sinusSVG(){const width=720,height=240,axisLeft=60,axisBottom=height/2,shiftDeg=state.diagramMode==="L"?-90:state.diagramMode==="C"?90:0,shift=shiftDeg*Math.PI/180,u=[],i=[];for(let x=0;x<=width;x+=2){const t=(x/width)*2*Math.PI,yU=Math.sin(t*state.frequencyFactor),yI=Math.sin(t*state.frequencyFactor+shift),pyU=height/2-yU*(state.amplitude/10)*(height/2-28),pyI=height/2-yI*(state.amplitude/10)*(height/2-28);u.push(`${x},${pyU}`);i.push(`${x},${pyI}`)}return `<svg viewBox="0 0 ${width} ${height}" style="width:100%;border:1px solid var(--line);border-radius:18px;background:#fff"><line x1="0" y1="${axisBottom}" x2="${width}" y2="${axisBottom}" stroke="currentColor" stroke-width="1" opacity=".3"/><line x1="${axisLeft}" y1="10" x2="${axisLeft}" y2="${height-10}" stroke="currentColor" stroke-width="1" opacity=".3"/><polyline fill="none" stroke="#0f766e" stroke-width="3" points="${u.join(" ")}"/><polyline fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="8 6" points="${i.join(" ")}"/><text x="12" y="18" font-size="12">U / I in V / A</text><text x="${width-42}" y="${axisBottom-10}" font-size="12">t in s</text><text x="${axisLeft-22}" y="34" font-size="11">+Û</text><text x="${axisLeft-14}" y="${axisBottom+4}" font-size="11">0</text><text x="${axisLeft-22}" y="${height-26}" font-size="11">-Û</text></svg>`}
function renderStart(){return `<div class="card hero"><div class="badge">Lernapp · Wechselspannung</div><h1>Klausurtraining Wechselspannung</h1><p class="small muted">Klar strukturiert und klausurorientiert: Grundlagen, Diagramme, Rechnen, Originalaufgaben und Checkliste.</p><div class="grid grid-4">${startTopics.map(t=>`<button class="topic-btn" onclick="goTab('${t.target}')"><div class="topic-title">${t.title}</div><div class="small muted">${physicsText(t.text)}</div></button>`).join("")}</div><div class="mini soft-mint"><div class="section-title-row"><div><strong>Lernfokus</strong></div><span class="marker dark">orientieren</span></div><div class="small" style="margin-top:8px">Arbeite Schritt für Schritt: zuerst Grundlagen und Diagramme, danach Rechnen, anschließend Klausurvorbereitung und Aufgaben.</div></div><div class="mini"><div class="section-title-row"><div><strong>Motivierender Hinweis</strong></div><span class="marker dark">dranbleiben</span></div><div class="small" style="margin-top:8px">Sorgfältiges, regelmäßiges Üben bringt hier mehr als schnelles Abarbeiten. Nimm dir lieber wenige Aufgaben bewusst vor und deute deine Ergebnisse immer auch fachlich.</div></div><div class="mini soft-mint"><div style="display:flex;align-items:center;gap:8px;font-weight:800;color:var(--teal2);margin-bottom:10px">🧪 PTA-Kontext</div><div class="grid grid-3">${ptaBlocks.map(b=>`<div class="mini"><div class="topic-title">${b.title}</div><div class="small muted">${physicsText(b.text)}</div></div>`).join("")}</div></div><div class="btnrow"><button class="btn primary" onclick="goTab('grundlagen')">Jetzt starten</button><button class="btn" onclick="goTab('training')">Direkt zur Klausurvorbereitung</button><button class="btn" onclick="goTab('aufgaben')">Zu den Aufgaben</button></div></div>`}
function renderGrundlagen(){const c=computeValues();return `<div class="grid grid-2"><div class="card"><h2>Gleichspannung und Wechselspannung</h2><p class="small muted">Bei Gleichspannung bleibt die Polarität konstant. Bei Wechselspannung ändern sich Betrag und Polarität periodisch mit der Zeit. Für viele technische Betrachtungen wird ein sinusförmiger Verlauf angenommen.</p><div class="formula">u(t) = Û · sin(ω · t + φ)</div><div class="grid grid-2" style="margin-top:12px"><div class="mini"><strong>Gleichspannung</strong><br><span class="small muted">konstante Richtung, konstante Polarität</span></div><div class="mini"><strong>Wechselspannung</strong><br><span class="small muted">periodischer Verlauf, Richtungswechsel</span></div><div class="mini"><strong>Stromnetz</strong><br><span class="small muted">50 Hz bedeutet 50 Perioden pro Sekunde</span></div><div class="mini"><strong>230 V</strong><br><span class="small muted">im Stromnetz meist Effektivwert</span></div></div></div><div class="card"><h2>Zusammenhang von T, f und ω</h2><div class="formula">T = Periodendauer</div><div class="formula" style="margin-top:10px">f = 1 / T</div><div class="formula" style="margin-top:10px">ω = 2πf</div><div class="mini" style="margin-top:12px"><strong>Deutung:</strong> Die Frequenz gibt an, wie oft sich ein periodischer Vorgang pro Sekunde wiederholt. Die Kreisfrequenz beschreibt denselben Vorgang in der Winkeldarstellung.</div><div class="feedback warnbox"><strong>Typischer Fehler:</strong> T und f werden oft vertauscht.</div></div></div><div class="grid grid-2"><div class="card"><h2>Effektivwert und Scheitelwert</h2><p class="small muted">Der Effektivwert ist der Gleichspannungswert, der in einem ohmschen Widerstand dieselbe elektrische Wirkung erzielt wie die betrachtete Wechselspannung.</p><div class="formula">U${sub("eff")} = Û / √2</div><div class="formula" style="margin-top:10px">Û = U${sub("eff")} · √2</div><div style="margin-top:12px"><label class="label">Effektivwert U${sub("eff")} in V</label><input type="text" value="${state.uEffValue}" oninput="setField('uEffValue', this.value)"></div><div class="mini soft-mint" style="margin-top:12px"><strong>Scheitelwert:</strong> ${formatNumber(c.uHat,2)} V</div><div class="mini" style="margin-top:12px"><strong>Beispiel Stromnetz:</strong> 230 V entsprechen ungefähr ${formatNumber(230*Math.sqrt(2),1)} V als Scheitelwert.</div></div><div class="card"><h2>Zentrale fachliche Aussagen</h2><div class="mini"><strong>Deutungsfrage:</strong> Warum ist der Scheitelwert größer als 230 V, obwohl im Stromnetz von 230 V gesprochen wird?</div><div class="feedback ok"><strong>Lösungsidee:</strong> Die 230 V bezeichnen den Effektivwert, nicht den Maximalwert.</div><div class="mini"><strong>Merksatz:</strong> In Klausuren sollte klar zwischen Augenblickswert, Scheitelwert und Effektivwert unterschieden werden.</div></div></div>`}
function renderSinus(){return `<div class="card"><div class="section-title-row"><h2>Zeitdiagramme von Spannung und Stromstärke</h2><span class="marker dark">visualisieren</span></div><div class="btnrow" style="margin-top:12px"><button class="btn ${state.diagramMode==='R'?'primary':''}" onclick="setDiagramMode('R')">Widerstand</button><button class="btn ${state.diagramMode==='L'?'primary':''}" onclick="setDiagramMode('L')">Spule</button><button class="btn ${state.diagramMode==='C'?'primary':''}" onclick="setDiagramMode('C')">Kondensator</button></div><div style="margin-top:12px">${sinusSVG()}</div><div class="grid grid-2" style="margin-top:14px"><div><div class="small"><strong>Amplitude:</strong> ${state.amplitude}</div><input type="range" min="1" max="10" step="1" value="${state.amplitude}" oninput="setAmplitude(this.value)" style="width:100%"></div><div><div class="small"><strong>Frequenzfaktor:</strong> ${state.frequencyFactor}</div><input type="range" min="1" max="5" step="1" value="${state.frequencyFactor}" oninput="setFrequencyFactor(this.value)" style="width:100%"></div></div><div class="grid grid-3" style="margin-top:12px"><div class="mini"><strong>Durchgezogen:</strong><br><span class="small muted">Spannung U</span></div><div class="mini"><strong>Gestrichelt:</strong><br><span class="small muted">Stromstärke I</span></div><div class="mini"><strong>Phasenlage:</strong><br><span class="small muted">Bei R phasengleich, bei L eilt U voraus, bei C eilt I voraus.</span></div></div></div><div class="card"><h2>Operatorenorientierte Diagrammaufgaben</h2>${diagramTasks.map(t=>`<div class="mini" style="margin-top:12px"><div class="btnrow"><span class="marker">Operator: ${t.operator}</span><span class="marker dark">Diagrammdeutung</span></div><div style="font-weight:700;margin-top:10px">${physicsText(t.prompt)}</div><button class="btn" style="margin-top:10px" onclick="toggleDiagramSolution(${t.id})">${state.openDiagramSolution===t.id?'Lösung ausblenden':'Lösung einblend function renderRLC(){const current=rlcData[state.rlcMode];return `<div class="card dark"><div class="badge" style="background:#ffffff14;color:#fff;border-color:#ffffff20">Bauelemente im Wechselstromkreis</div><h2 style="font-size:2rem;margin-top:10px">R · L · C als Herzstück des Themas</h2><p class="small" style="color:#d7efea">Hier werden ohmscher Widerstand, induktiver Blindwiderstand und kapazitiver Blindwiderstand systematisch verglichen. Fachlich wichtig ist: Für die gesamte Schaltung gilt der Wechselstromwiderstand Z = U${sub("eff")} / I${sub("eff")}. Bei der idealen Spule und beim idealen Kondensator beschreibt man die frequenzabhängigen Anteile mit X${sub("L")} bzw. X${sub("C")}.</p><div class="grid grid-2"><div class="mini" style="background:#ffffff12;color:#fff;border-color:#ffffff20"><strong>Formel</strong><br>R, X${sub("L")}, X${sub("C")} korrekt zuordnen</div><div class="mini" style="background:#ffffff12;color:#fff;border-color:#ffffff20"><strong>Grundidee</strong><br>Z = U${sub("eff")} / I${sub("eff")}</div><div class="mini" style="background:#ffffff12;color:#fff;border-color:#ffffff20"><strong>Phase</strong><br>phasengleich, voreilend, nacheilend</div><div class="mini" style="background:#ffffff12;color:#fff;border-color:#ffffff20"><strong>Deutung</strong><br>größer oder kleiner mit f</div></div></div><div class="card"><h2>Vergleichsmatrix</h2><div class="grid grid-3">${Object.values(rlcData).map(item=>`<div class="mini ${item.soft}"><div class="topic-title">${item.label}</div><div class="formula">${physicsText(item.formula)}</div><div class="small" style="margin-top:10px"><strong>Art:</strong> ${item.type}</div><div class="small"><strong>Phasenlage:</strong> ${item.phase}</div><div class="small"><strong>Frequenzverhalten:</strong> ${physicsText(item.frequency)}</div></div>`).join("")}</div></div><div class="grid grid-2"><div class="card"><h2>Interaktive Auswahl</h2><div class="btnrow" style="margin-top:12px"><button class="btn ${state.rlcMode==='R'?'primary':''}" onclick="setRlcMode('R')">Ohmscher Leiter</button><button class="btn ${state.rlcMode==='L'?'primary':''}" onclick="setRlcMode('L')">Spule</button><button class="btn ${state.rlcMode==='C'?'primary':''}" onclick="setRlcMode('C')">Kondensator</button></div><div class="mini ${current.soft}" style="margin-top:12px"><div class="topic-title" style="font-size:1.2rem">${current.label}</div><div class="formula">${physicsText(current.formula)}</div><div class="mini" style="margin-top:10px"><strong>Art:</strong> ${current.type}</div><div class="mini" style="margin-top:10px"><strong>Phasenlage:</strong> ${current.phase}</div><div class="mini" style="margin-top:10px"><strong>Frequenzverhalten:</strong> ${physicsText(current.frequency)}</div></div></div><div class="card"><h2>Deutung in Klausursprache</h2><div class="mini soft-mint"><strong>Typische Aussage:</strong> ${current.phase}</div><div class="mini" style="margin-top:10px"><strong>Physikalische Bedeutung:</strong> ${physicsText(current.meaning)}</div><div class="mini" style="margin-top:10px"><strong>Typische Fehlvorstellung:</strong> ${physicsText(current.error)}</div><div class="mini" style="margin-top:10px"><strong>Klausurhinweis:</strong> Ein Zahlenwert allein reicht nicht. Erwartet wird zusätzlich eine sprachliche Deutung, etwa „phasengleich“, „um 90° voreilend“, „um 90° nacheilend“ oder „nimmt mit der Frequenz zu/ab“.</div><div class="feedback warnbox"><strong>Merksatz:</strong> R bleibt gleich, bei der Spule wächst X${sub("L")} mit f, beim Kondensator sinkt X${sub("C")} mit f.</div></div></div>`}
function renderCalcTasks(){return calculationTasks.map(task=>{const aKey=`calc_${task.id}`,hKey=`hint_${task.id}`,sKey=`sol_${task.id}`;if(!(aKey in state)) state[aKey]="";if(!(hKey in state)) state[hKey]=false;if(!(sKey in state)) state[sKey]=false;const numeric=parseGermanNumber(state[aKey]),isValid=Number.isFinite(numeric),isCorrect=isValid&&Math.abs(numeric-task.expected)<=task.tolerance,checked=state[aKey]!=="";return `<div class="card"><div class="btnrow"><span class="marker">Operator: ${task.operator}</span><span class="marker warn">typische Fehlerquelle: Einheiten</span></div><h3 style="margin-top:12px">${task.level}: Rechenaufgabe ${task.id}</h3><p class="small">${physicsText(task.prompt)}</p><div class="grid" style="grid-template-columns:1fr auto;margin-top:12px"><input type="text" value="${state[aKey]}" oninput="setDynamicField('${aKey}', this.value)" placeholder="Ergebnis in ${task.unit}"><div class="mini soft-mint center">${task.unit}</div></div><div class="btnrow" style="margin-top:12px"><button class="btn" onclick="toggleDynamic('${hKey}')">${state[hKey]?'Hinweis ausblenden':'Hinweis einblenden'}</button><button class="btn" onclick="toggleDynamic('${sKey}')">${state[sKey]?'Lösung ausblenden':'Lösung einblenden'}</button></div>${state[hKey]?`<div class="feedback ok">${physicsText(task.hint)}</div>`:''}${checked?`<div class="feedback ${isCorrect?'ok':'warnbox'}"><strong>${isCorrect?'Treffer' : 'Prüfen Sie Ihren Rechenweg'}</strong><br>${isCorrect?`Das Ergebnis liegt im richtigen Bereich: ${formatNumber(task.expected,2)} ${task.unit}`:physicsText(task.error)}</div>`:''}${state[sKey]?`<div class="feedback ok">${physicsText(task.solution)}</div>`:''}<div class="mini soft-mint" style="margin-top:12px"><strong>Deutung:</strong> ${physicsText(task.interpretation)}</div></div>`}).join("")}
function convertValue(value,from,to,group){const num=parseGermanNumber(value);if(!Number.isFinite(num)) return NaN;const mapL={H:1,mH:1e-3,"µH":1e-6,nH:1e-9};const mapC={F:1,mF:1e-3,"µF":1e-6,nF:1e-9,pF:1e-12};const m=group==="L"?mapL:mapC;return num*m[from]/m[to]}
function renderConversionPractice(){const resultL=convertValue(state.convValueL,state.convFromL,state.convToL,"L");const resultC=convertValue(state.convValueC,state.convFromC,state.convToC,"C");const unitOptionsL=["H","mH","µH","nH"];const unitOptionsC=["F","mF","µF","nF","pF"];return `<div class="card"><div class="section-title-row"><h2>Umrechnung von Induktivitäten und Kapazitäten</h2><span class="marker dark">üben</span></div><div class="grid grid-2"><div class="mini soft-sky"><strong>Induktivität umrechnen</strong><div class="converter-row" style="margin-top:12px"><input type="text" value="${state.convValueL}" oninput="setField('convValueL', this.value)"><select onchange="setField('convFromL', this.value)">${unitOptionsL.map(u=>`<option ${u===state.convFromL?'selected':''}>${u}</option>`).join("")}</select><select onchange="setField('convToL', this.value)">${unitOptionsL.map(u=>`<option ${u===state.convToL?'selected':''}>${u}</option>`).join("")}</select></div><div class="feedback ok" style="margin-top:12px"><strong>Ergebnis:</strong> ${formatNumber(resultL,6)} ${state.convToL}</div><div class="small muted" style="margin-top:8px">Beispiel: 80 mH = 0,08 H</div></div><div class="mini soft-mint"><strong>Kapazität umrechnen</strong><div class="converter-row" style="margin-top:12px"><input type="text" value="${state.convValueC}" oninput="setField('convValueC', this.value)"><select onchange="setField('convFromC', this.value)">${unitOptionsC.map(u=>`<option ${u===state.convFromC?'selected':''}>${u}</option>`).join("")}</select><select onchange="setField('convToC', this.value)">${unitOptionsC.map(u=>`<option ${u===state.convToC?'selected':''}>${u}</option>`).join("")}</select></div><div class="feedback ok" style="margin-top:12px"><strong>Ergebnis:</strong> ${formatNumber(resultC,12)} ${state.convToC}</div><div class="small muted" style="margin-top:8px">Beispiel: 470 nF = 0,00000047 F</div></div></div></div>`}
function renderRechnen(){const c=computeValues();return `<div class="grid grid-2"><div class="card"><div class="section-title-row"><h2>Formeltrainer</h2><span class="marker dark">anwenden</span></div><div class="grid grid-2" style="margin-top:12px"><div><label class="label">Periodendauer T in s</label><input type="text" value="${state.tValue}" oninput="setField('tValue', this.value)"></div><div><label class="label">Frequenz f in Hz</label><input type="text" value="${state.fValue}" oninput="setField('fValue', this.value)"></div><div><label class="label">Induktivität L in H</label><input type="text" value="${state.lValue}" oninput="setField('lValue', this.value)"></div><div><label class="label">Kapazität C in F</label><input type="text" value="${state.cValue}" oninput="setField('cValue', this.value)"></div></div><div class="grid grid-2" style="margin-top:12px"><div class="formula">f = 1 / T = ${formatNumber(c.fFromT,2)} Hz</div><div class="formula">ω = 2πf = ${formatNumber(c.omega,2)} s⁻¹</div><div class="formula">X${sub("L")} = ω·L = ${formatNumber(c.xl,2)} Ω</div><div class="formula">X${sub("C")} = 1 / (ω·C) = ${formatNumber(c.xc,2)} Ω</div><div class="formula">Û = U${sub("eff")} · √2 = ${formatNumber(c.uHat,2)} V</div><div class="formula">f${sub("0")} = 1 / (2π√(LC)) = ${formatNumber(c.resonance,2)} Hz</div></div></div><div class="card"><h2>Vertiefung: Reihenschwingkreis</h2><div class="mini"><strong>Qualitative Idee:</strong> Im Reihenschwingkreis wirken Spule und Kondensator gegeneinander. Bei einer bestimmten Frequenz können sich ihre Blindwiderstände betragsmäßig ausgleichen.</div><div class="formula" style="margin-top:12px">f${sub("0")} = 1 / (2π√(LC))</div><div class="mini" style="margin-top:12px"><strong>Thomsonsche Gleichung:</strong> Sie beschreibt die Eigen- bzw. Resonanzfrequenz des idealisierten LC-Systems.</div><div class="feedback warnbox"><strong>Wichtig für Klausuren:</strong> Ein qualitativer Zusammenhang reicht oft nicht. Man soll zusätzlich beschreiben, was sich physikalisch bei Resonanz ändert.</div><div class="mini soft-mint"><strong>Merksatz:</strong> Reihenschwingkreis und Thomsonsche Gleichung sind die Brücke von den Blindwiderständen zur Resonanzidee.</div></div></div>${renderConversionPractice()}${renderCalcTasks()}`}
function renderQuestion(q){const selected=state.quizAnswers[q.id],isCorrect=selected===q.correct;return `<div class="card"><div class="btnrow"><span class="marker">Operator: ${q.operator}</span><span class="marker dark">klausurrelevant</span></div><h3 style="margin-top:12px">Begriffsaufgabe ${q.id}</h3><p class="small">${physicsText(q.prompt)}</p><div>${q.options.map((opt,i)=>`<button class="choice ${selected===i?'sel':''}" onclick="setQuizAnswer(${q.id}, ${i})">${physicsText(opt)}</button>`).join("")}</div>${selected!==undefined?`<div class="feedback ${isCorrect?'ok':'warnbox'}"><strong>${isCorrect?'Richtig' : 'Noch nicht vollständig richtig'}</strong><br>${physicsText(q.explanation)}</div>`:''}</div>`}
function renderTraining(){return `<div class="card"><div class="section-title-row"><h2>Hinweis zum Klausurstil</h2><span class="marker dark">prüfungsnah</span></div><p class="small muted">Achte bei den Aufgaben nicht nur auf das Rechnen, sondern auch auf die sprachliche Präzision: <strong>beschreiben</strong>, <strong>erläutern</strong>, <strong>begründen</strong>, <strong>deuten</strong> und <strong>beurteilen</strong> verlangen unterschiedlich tiefe Antworten.</p><div class="grid grid-3"><div class="mini soft-mint"><strong>Arbeitsweise</strong><div class="small" style="margin-top:8px">Erst sicher verstehen, dann rechnen, dann deuten.</div></div><div class="mini soft-amber"><strong>Motivation</strong><div class="small">Jede sauber gelöste Aufgabe stärkt Fachsprache, Sicherheit und Klausurroutine.</div></div><div class="mini soft-rose"><strong>Nächster Schritt</strong><div class="small">Nach der Klausurvorbereitung direkt zu den Aufgaben wechseln und dort eigene Lösungswege notieren.</div></div></div></div><div class="grid grid-2">${ptaQuestions.map(item=>`<div class="card"><h3>${item.title}</h3><div class="mini"><strong>Arbeitsauftrag:</strong> ${physicsText(item.task)}</div><div class="mini soft-mint" style="margin-top:10px"><strong>Hinweis:</strong> ${physicsText(item.hint)}</div></div>`).join("")}</div>${trainingQuestions.map(renderQuestion).join("")}<div class="card"><h2>Zusätzliche klausurnahe Schreibaufgaben</h2>${miniExamTasks.map(task=>{const key='mini_'+task.id;if(!(key in state.miniDrafts)) state.miniDrafts[key]='';return `<div class="mini" style="margin-top:12px"><span class="marker">Operator: ${task.operator}</span><h3 style="margin-top:10px">${task.title}</h3><p class="small">${physicsText(task.prompt)}</p><textarea oninput="setMiniDraft('${key}', this.value)" placeholder="Notieren Sie hier Ihren Antwortentwurf …">${state.miniDrafts[key]}</textarea><details style="margin-top:12px"><summary>Erwartungshorizont</summary><div class="small" style="margin-top:10px">${physicsText(task.expectation)}</div></details></div>`}).join("")}</div><div class="card"><h2>Datenschutz-Hinweis für den Schulgebrauch</h2><div class="feedback warnbox"><strong>Hinweis:</strong> Diese App speichert Lernstände nur lokal im Browser. Es sollen keine personenbezogenen Daten eingegeben werden.</div></div>`}
function renderAufgaben(){return `<div class="card dark"><div class="section-title-row"><h2>Aufgaben</h2><span class="marker dark">mit Hinweisen und Musterlösungen</span></div><p class="small" style="color:#d7efea">Dieser Bereich bündelt die zentralen LEIFI-Aufgaben aus der Wechselstromtechnik. Die Aufgaben sind nach Themenclustern geordnet. Jede Aufgabe enthält ein klickbares Feld für Hinweise und ein klickbares Feld für die Musterlösung.</p><div class="grid grid-3"><div class="mini" style="background:#ffffff12;color:#fff;border-color:#ffffff20"><strong>Hinweis</strong><div class="small" style="margin-top:8px">Arbeite die Aufgaben schriftlich und vergleiche erst danach mit der Musterlösung.</div></div><div class="mini" style="background:#ffffff12;color:#fff;border-color:#ffffff20"><strong>Ziel</strong><div class="small" style="margin-top:8px">Nicht nur Ergebnisse sammeln, sondern Lösungswege fachsprachlich formulieren.</div></div><div class="mini" style="background:#ffffff12;color:#fff;border-color:#ffffff20"><strong>Struktur</strong><div class="small" style="margin-top:8px">Spule, Kondensator, gemeinsame Aufgaben sowie Resonanz und Schwingkreise.</div></div></div></div>${abiturGroups.map((group,gIdx)=>`<div class="card"><div class="mini ${group.color}"><div class="section-title-row"><h2 style="font-size:1.35rem">${group.title}</h2><span class="marker dark">${group.tasks.length} Aufgaben</span></div><div class="small" style="margin-top:8px">${group.intro}</div></div><div style="margin-top:14px">${group.tasks.map((task,tIdx)=>{const key=`abi_${gIdx}_${tIdx}`;if(!(key in state.abiturAnswers)) state.abiturAnswers[key]="";return `<div class="mini" style="margin-top:12px"><div class="btnrow"><span class="marker">Quelle: ${task.source}</span><span class="marker dark">Operator: ${task.operator}</span></div><h3 style="margin-top:12px">${task.title}</h3><div class="small muted" style="margin-bottom:10px">Themencluster: ${group.title}</div><div class="mini"><strong>Aufgabe:</strong> ${physicsText(task.prompt)}</div><div style="margin-top:12px"><label class="label">Eigene Notizen / Lösungsweg</label><textarea oninput="setAbiAnswer('${key}', this.value)" placeholder="Schreiben Sie hier Ihren eigenen Lösungsweg ...">${state.abiturAnswers[key]}</textarea></div><details style="margin-top:12px"><summary>Hinweise zur Musterlösung</summary><div class="small" style="margin-top:10px">${physicsText(task.hint)}</div></details><details style="margin-top:12px"><summary>Musterlösung</summary><div class="small" style="margin-top:10px">${physicsText(task.solution)}</div></details></div>`}).join("")}</div></div>`).join("")}`}
function renderCheckliste(){const done=state.checklist.filter(Boolean).length,progress=Math.round(done/checklistItems.length*100);return `<div class="card"><div class="section-title-row"><h2>Checkliste zur Klausurvorbereitung</h2><span class="marker dark">systematisch</span></div><div class="progress" style="margin-top:12px"><span style="width:${progress}%"></span></div><div class="small muted" style="margin-top:8px">${done} von ${checklistItems.length} Punkten markiert</div><div class="mini soft-mint" style="margin-top:12px"><strong>Hinweis zur Nutzung:</strong><div class="small" style="margin-top:8px">Die Checkliste dient als ruhige Selbstkontrolle. Markiere nur Punkte, die wirklich sicher beherrscht werden und fachsprachlich erklärt werden können.</div></div><div class="grid" style="gap:12px;margin-top:12px">${checklistItems.map((item,i)=>`<label class="checkitem"><input type="checkbox" ${state.checklist[i]?'checked':''} onchange="toggleChecklist(${i}, this.checked)"><span class="small">${physicsText(item)}</span></label>`).join("")}</div></div>`}
function render(){renderNav();const content=document.getElementById("content");const views={start:renderStart,grundlagen:renderGrundlagen,sinus:renderSinus,rlc:renderRLC,rechnen:renderRechnen,training:renderTraining,aufgaben:renderAufgaben,checkliste:renderCheckliste};content.innerHTML=views[state.activeTab]()}
function goTab(id){state.activeTab=id;render()}
function setField(k,v){state[k]=v;render()}
function setAmplitude(v){state.amplitude=Number(v);render()}
function setFrequencyFactor(v){state.frequencyFactor=Number(v);render()}
function setDiagramMode(m){state.diagramMode=m;render()}
function setRlcMode(m){state.rlcMode=m;render()}
function toggleDiagramSolution(id){state.openDiagramSolution=state.openDiagramSolution===id?null:id;render()}
function setQuizAnswer(id,index){state.quizAnswers[id]=index;saveQuiz();render()}
function toggleChecklist(i,checked){state.checklist[i]=checked;saveChecklist();render()}
function setDynamicField(k,v){state[k]=v;render()}
function toggleDynamic(k){state[k]=!state[k];render()}
function setAbiAnswer(k,v){state.abiturAnswers[k]=v;saveAbi()}
function setMiniDraft(k,v){state.miniDrafts[k]=v;saveMini()}
window.goTab=goTab; window.setField=setField; window.setAmplitude=setAmplitude; window.setFrequencyFactor=setFrequencyFactor; window.setDiagramMode=setDiagramMode; window.setRlcMode=setRlcMode; window.toggleDiagramSolution=toggleDiagramSolution; window.setQuizAnswer=setQuizAnswer; window.toggleChecklist=toggleChecklist; window.setDynamicField=setDynamicField; window.toggleDynamic=toggleDynamic; window.setAbiAnswer=setAbiAnswer; window.setMiniDraft=setMiniDraft;
render();
</script>
</body>
</html>
